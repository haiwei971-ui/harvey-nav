<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Harvey</title>

<style>
:root {
  --bg: #ffffff;
  --card: #f8f9fa;
  --text: #202124;
  --border: #e0e0e0;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f1115;
    --card: #1b1f27;
    --text: #e8eaed;
    --border: #2b2f36;
  }
}

body {
  margin: 0;
  background: var(--bg);
  font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
  color: var(--text);
  display: flex;
  flex-direction: column;
  align-items: center;
}

.logo {
  margin-top: 10vh;
  font-size: 42px;
  font-weight: 600;
  letter-spacing: 1px;
}

.search-box {
  margin-top: 25px;
  width: min(720px, 90%);
  display: flex;
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 12px 18px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

.search-box input {
  flex: 1;
  border: none;
  outline: none;
  font-size: 16px;
  background: transparent;
  color: var(--text);
}

.grid {
  margin-top: 35px;
  width: min(900px, 92%);
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 18px;
}

@media (max-width: 900px) {
  .grid { grid-template-columns: repeat(3, 1fr); }
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px 10px;
  text-align: center;
  text-decoration: none;
  color: var(--text);
  transition: 0.15s ease;
}

.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

.icon {
  height: 32px;
  margin-bottom: 10px;
}

.footer {
  margin: 40px 0 20px;
  font-size: 12px;
  opacity: 0.5;
}
</style>
</head>

<body>

<div class="logo">Harvey</div>

<form class="search-box" onsubmit="goSearch(event)">
  <input id="q" placeholder="Search Google..." autocomplete="off">
</form>

<div class="grid">

<a class="card" href="https://chatgpt.com" target="_blank">
  <img class="icon" src="https://upload.wikimedia.org/wikipedia/commons/0/04/ChatGPT_logo.svg">
  ChatGPT
</a>

<a class="card" href="https://gemini.google.com" target="_blank">
  <img class="icon" src="https://upload.wikimedia.org/wikipedia/commons/8/8e/Google_Gemini_logo.svg">
  Gemini
</a>

<a class="card" href="https://mail.google.com" target="_blank">
  <img class="icon" src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Gmail_icon_%282020%29.svg">
  Gmail
</a>

<a class="card" href="https://github.com" target="_blank">
  <img class="icon" src="https://upload.wikimedia.org/wikipedia/commons/9/91/Octicons-mark-github.svg">
  GitHub
</a>

<a class="card" href="https://drive.google.com" target="_blank">
  <img class="icon" src="https://upload.wikimedia.org/wikipedia/commons/d/da/Google_Drive_logo.png">
  Drive
</a>

<a class="card" href="https://calendar.google.com" target="_blank">
  <img class="icon" src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Google_Calendar_icon_%282020%29.svg">
  Calendar
</a>

<a class="card" href="https://dash.cloudflare.com" target="_blank">
  <img class="icon" src="https://upload.wikimedia.org/wikipedia/commons/4/4b/Cloudflare_Logo.svg">
  Cloudflare
</a>

<a class="card" href="https://my.vultr.com" target="_blank">
  <img class="icon" src="https://www.vultr.com/media/logo.svg">
  Vultr
</a>

<a class="card" href="https://cloud.oracle.com" target="_blank">
  <img class="icon" src="https://upload.wikimedia.org/wikipedia/commons/5/50/Oracle_logo.svg">
  Oracle
</a>

<a class="card" href="https://my.racknerd.com" target="_blank">
  <img class="icon" src="https://www.racknerd.com/wp-content/uploads/2020/03/logo.png">
  RackNerd
</a>

<a class="card" href="https://youtube.com" target="_blank">
  <img class="icon" src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg">
  YouTube
</a>

<a class="card" href="https://www.speedtest.net" target="_blank">
  <img class="icon" src="https://upload.wikimedia.org/wikipedia/commons/3/3b/Ookla_Speedtest_logo.svg">
  Speedtest
</a>

</div>

<div class="footer">nav.harveyi.com</div>

<script>
function goSearch(e) {
  e.preventDefault();
  const q = document.getElementById("q").value.trim();
  if (!q) return;
  window.location.href = "https://www.google.com/search?q=" + encodeURIComponent(q);
}
</script>

</body>
</html>
