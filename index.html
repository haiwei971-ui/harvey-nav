<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Harveyi</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
      /* Day */
      --bg-top:#FFFFFF; --bg-bottom:#F5F5F7;
      --text:#1D1D1F; --muted:rgba(0,0,0,0.45);
      --hair:rgba(0,0,0,0.06); --search:rgba(0,0,0,0.03);
      --glow-opacity:0.06;
      --icon-default-opacity: 0.60; /* 亮色模式默认透明度 */
    }

    body.theme-night{
      --bg-top:#09112A; --bg-bottom:#070A12;
      --text:rgba(255,255,255,0.92); --muted:rgba(255,255,255,0.45);
      --hair:rgba(255,255,255,0.08); --search:rgba(255,255,255,0.08);
      --glow-opacity:0.35;
      --icon-default-opacity: 0.85; /* ✅ 深色模式提升图标透明度，更显眼 */
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0; font-family:Inter,-apple-system,sans-serif; color:var(--text);
      background:linear-gradient(180deg,var(--bg-top),var(--bg-bottom));
      min-height:100vh; transition:background 1.5s var(--ease), color 1.5s var(--ease);
      overflow-x:hidden;
    }

    .bg-flow{ position:fixed; inset:-20%; pointer-events:none; z-index:-3; filter:blur(120px); opacity:.32; }
    .bg-flow .blob{
      position:absolute; width:70vmax; height:70vmax; border-radius:999px;
      background: radial-gradient(circle, var(--accent, #a1c4fd), transparent 60%);
      animation: drift 60s cubic-bezier(.22,.61,.36,1) infinite alternate;
    }
    @keyframes drift{ from{transform:translate(-5%,-5%)} to{transform:translate(10%,10%)} }

    .wrap{ max-width:1000px; margin:auto; padding:calc(26px + env(safe-area-inset-top)) 20px 54px; }
    .top{ display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; opacity:.86; }
    .clock{ font-family:"JetBrains Mono"; font-weight:600; font-size:18px; }

    .search{
      display:flex; align-items:center; gap:12px; background:var(--search); border:1px solid var(--hair);
      padding:13px 18px; border-radius:999px; margin-bottom:18px; backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); transition:.3s var(--ease);
    }
    .search:focus-within{ transform:scaleX(1.018); border-color:rgba(124,92,255,0.4); }
    .search input{ flex:1; width:100%; background:transparent; border:0; outline:none; color:var(--text); font-size:18px; }

    .section{ margin:16px 0 10px; display:flex; align-items:center; gap:12px; color:var(--muted); font-size:11px; letter-spacing:.2em; text-transform:uppercase; font-weight:600; }
    .section .line{ flex:1; height:1px; background:var(--hair); }

    .grid{ display:grid; grid-template-columns:repeat(6,1fr); gap:26px 18px; }
    @media (max-width:900px){ .grid{ grid-template-columns:repeat(4,1fr);} }
    @media (max-width:600px){ .grid{ grid-template-columns:repeat(3,1fr);} }

    .item{ position:relative; display:flex; flex-direction:column; align-items:center; gap:12px; text-decoration:none; color:var(--muted); transition:.25s var(--ease); min-height:86px; isolation:isolate; }
    .item:active{ transform:scale(0.95); transition:0.1s; }

    .icon{ width:54px; height:54px; display:grid; place-items:center; position:relative; }

    /* ✅ 图标视觉优化核心 */
    .icon img.single{
      width:36px; height:36px; object-fit:contain;
      filter: grayscale(100%) brightness(1.2) opacity(var(--icon-default-opacity));
      transition: .35s var(--ease);
    }
    /* ✅ 深色模式下：为纯黑图标（如 GitHub/X）增加白色反转保护 */
    body.theme-night .item.github img, body.theme-night .item.x img {
      filter: grayscale(100%) invert(1) brightness(1.5) opacity(var(--icon-default-opacity));
    }

    .item:hover .icon img.single{
      filter: grayscale(0%) brightness(1) opacity(1) !important;
      transform: translateY(-6px);
    }

    /* ✅ Gemini 双层唤醒优化 */
    .icon.gemini img{ position:absolute; width:36px; height:36px; object-fit:contain; transition:.38s var(--ease); }
    .icon.gemini img.g0{ filter: grayscale(100%) brightness(1.2) opacity(var(--icon-default-opacity)); }
    .icon.gemini img.g1{ opacity:0; filter: none; }
    .item:hover .icon.gemini img.g0{ opacity:0; transform: translateY(-6px); }
    .item:hover .icon.gemini img.g1{ opacity:1; transform: translateY(-6px); }

    .item:hover .icon::after{
      content:""; position:absolute; inset:-10px; border-radius:50%; z-index:-1;
      filter:blur(35px); opacity:var(--glow-opacity);
      background:radial-gradient(circle, var(--brand-color, #7C5CFF), transparent 75%);
    }

    .label{ font-size:13px; transition:.25s var(--ease); text-align:center; white-space:nowrap; }
    .item:hover .label{ color:var(--text); }
  </style>
</head>

<body>
  <div class="bg-flow"><div class="blob"></div></div>
  <div class="wrap">
    <div class="top"><div id="greet">Hello.</div><div class="clock" id="clock">00:00</div></div>
    <form class="search" id="searchForm" autocomplete="off"><input id="q" placeholder="Search..." /></form>
    <div class="section">ESSENTIALS<div class="line"></div></div>
    <div id="ess" class="grid"></div>
    <div class="section" style="margin-top:18px;">EXTENDED<div class="line"></div></div>
    <div id="ext" class="grid"></div>
  </div>

  <script>
    const ICON_BASE = "icons/";
    const FALLBACK  = "openai.svg";

    function imgTag(src, cls){
      const safe = ICON_BASE + encodeURIComponent(src);
      return `<img class="${cls}" src="${safe}" loading="lazy" decoding="async" onerror="this.onerror=null;this.src='${ICON_BASE}${FALLBACK}'">`;
    }

    const SITES = [
      { n:"ChatGPT",      u:"https://chatgpt.com/",                  icons:["openai.svg"],                 c:"#10a37f", r:1 },
      { n:"Claude",       u:"https://claude.ai/",                    icons:["claude-color.svg"],           c:"#d97757", r:1 },
      { n:"Copilot",      u:"https://copilot.microsoft.com/",        icons:["copilot-color.svg"],           c:"#0078d4", r:1 },
      { n:"Gemini",       u:"https://gemini.google.com/",            gemini:true, s:1.14,                  c:"#4e85ff", r:1 },
      { n:"Cloudflare",   u:"https://dash.cloudflare.com/",          icons:["cloudflare-color.svg"],       c:"#f48120", r:1 },
      { n:"GitHub",       u:"https://github.com/",                   icons:["github.svg"],                 c:"#ffffff", r:1, cls:"github" },

      { n:"Gmail",        u:"https://mail.google.com/",              icons:["google-gmail.svg"],           c:"#ea4335", r:2 },
      { n:"Google",       u:"https://www.google.com/",               icons:["google-color.svg"],           c:"#4285f4", r:2 },
      { n:"Google Cloud", u:"https://console.cloud.google.com/",     icons:["googlecloud-color.svg"],      c:"#4285f4", r:2 },
      { n:"Google Drive", u:"https://drive.google.com/",             icons:["google-drive.svg"],           c:"#34a853", r:2 },
      { n:"Google Maps",  u:"https://maps.google.com/",              icons:["google-maps.svg"],            c:"#4285f4", r:2 },
      { n:"YouTube",      u:"https://youtube.com/",                  icons:["youtube_red.svg"],            c:"#ff0000", r:2 },

      { n:"AWS",          u:"https://aws.amazon.com/",               icons:["aws.svg"],                    c:"#ff9900", r:3 },
      { n:"Azure",        u:"https://portal.azure.com/",             icons:["azure.svg"],                  c:"#0078d4", r:3 },
      { n:"Bing",         u:"https://www.bing.com/",                 icons:["bing.svg"],                   c:"#008373", r:3 },
      { n:"X",            u:"https://x.com/",                        icons:["x.svg"],                      c:"#ffffff", r:3, cls:"x" },
      { n:"Reddit",       u:"https://www.reddit.com/",               icons:["reddit-color.svg"],           c:"#ff4500", r:3 },
      { n:"Telegram",     u:"https://web.telegram.org/",             icons:["telegram.svg"],               c:"#2aabee", r:3 },
      { n:"Apple",        u:"https://www.apple.com/",                icons:["apple.svg"],                  c:"#9aa0a6", r:3 }
    ];

    function render(){
      const ess = document.getElementById("ess"), ext = document.getElementById("ext");
      ess.innerHTML = ext.innerHTML = "";
      SITES.forEach(s=>{
        const a = document.createElement("a");
        a.className = `item ${s.cls || ""}`; a.href = s.u; a.target = "_blank"; a.rel = "noopener noreferrer";
        a.style.setProperty("--brand-color", s.c);
        if (s.s) a.style.setProperty("--s", String(s.s));

        let iconHTML = s.gemini 
          ? `<div class="icon gemini">${imgTag("gemini.svg", "g0")}${imgTag("gemini-color.svg", "g1")}</div>`
          : `<div class="icon">${imgTag(s.icons[0], "single")}</div>`;

        a.innerHTML = `${iconHTML}<div class="label">${s.n}</div>`;
        (s.r <= 2 ? ess : ext).appendChild(a);
      });
    }

    function updateTheme(){
      const h = new Date().getHours(), b = document.body, g = document.getElementById("greet");
      b.classList.toggle("theme-night", (h >= 17 || h < 8));
      g.textContent = (h >= 17 || h < 8) ? "Good night." : (h < 12 ? "Good morning." : "Good afternoon.");
    }

    function tick(){
      const d = new Date();
      document.getElementById("clock").textContent = `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
    }

    document.getElementById("searchForm").onsubmit = (e)=>{
      e.preventDefault(); window.open("https://www.google.com/search?q="+encodeURIComponent(document.getElementById("q").value.trim()), "_blank");
    };

    updateTheme(); tick(); render();
    setInterval(tick, 1000); setInterval(updateTheme, 60000);
  </script>
</body>
</html>
