<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Harveyi</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
      --bg-top:#FFFFFF; --bg-bottom:#F5F5F7;
      --text:#1D1D1F; --muted:rgba(0,0,0,0.52);
      --hair:rgba(0,0,0,0.08);
      --surface: rgba(255,255,255,0.56);
      --surface-strong: rgba(255,255,255,0.75);
      --icon-default-opacity: 0.65;
      --glow-opacity:0.12;
      --focus: rgba(0,122,255,0.32);
      --focus-border: rgba(0,122,255,0.42);
    }

    body.theme-night{
      --bg-top:#0B0F18; --bg-bottom:#070A12;
      --text:rgba(255,255,255,0.92); --muted:rgba(255,255,255,0.58);
      --hair:rgba(255,255,255,0.12);
      --surface: rgba(18,22,32,0.58);
      --surface-strong: rgba(255,255,255,0.05);
      --icon-default-opacity: 0.90;
      --glow-opacity:0.25;
      --focus: rgba(10,132,255,0.36);
      --focus-border: rgba(10,132,255,0.46);
    }

    *{ box-sizing:border-box }
    html,body{ height:100% }
    body{
      margin:0; font-family: Inter, -apple-system, system-ui, sans-serif;
      color:var(--text);
      background: linear-gradient(180deg,var(--bg-top),var(--bg-bottom));
      min-height:100vh;
      transition: background 900ms var(--ease), color 900ms var(--ease);
      overflow-x:hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .bg-flow{ position:fixed; inset:-20%; pointer-events:none; z-index:-3; filter:blur(120px); opacity:.26; }
    .bg-flow .blob{
      position:absolute; width:70vmax; height:70vmax; border-radius:999px;
      background: radial-gradient(circle, var(--brand-color, #a1c4fd), transparent 62%);
      animation: drift 70s cubic-bezier(.45, 0, .55, 1) infinite alternate;
    }
    @keyframes drift{ from{ transform:translate(-8%,-8%) } to{ transform:translate(10%,10%) } }

    .wrap{ max-width: 1040px; margin:auto; padding: calc(22px + env(safe-area-inset-top)) 20px 58px; }

    .top{ display:flex; justify-content:space-between; align-items:flex-end; gap:14px; margin-bottom: 10px; opacity:.92; }
    .top-left .greet{ font-size:22px; font-weight:650; margin-bottom:2px; letter-spacing:-.2px; }
    .top-left .weather{ font-size:13px; color:var(--muted); display:flex; gap:8px; align-items:center; min-height:18px; }
    
    /* ✅ 监控文字样式补丁 */
    #monitor-status {
      font-family: "JetBrains Mono";
      font-size: 11px;
      margin-left: 2px;
      padding-left: 8px;
      border-left: 1px solid var(--hair);
      letter-spacing: 0;
      transition: color .3s ease;
    }

    .clock{ font-family:"JetBrains Mono"; font-weight:600; font-size:24px; letter-spacing:-1px; white-space:nowrap; }

    .quote-area{ margin:14px 0 18px; padding:0 10px; border-left:2px solid var(--hair); opacity:.78; }
    .quote-text{ font-size:14px; font-style:italic; color:var(--muted); line-height:1.55; max-width:640px; }
    .quote-author{ font-size:11px; text-transform:uppercase; letter-spacing:.12em; margin-top:6px; opacity:.62; }

    .search{
      display:flex; align-items:center; gap:12px;
      background: var(--surface);
      border:1px solid var(--hair);
      padding:14px 18px; border-radius:999px;
      margin-bottom:18px;
      backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px);
      transition: transform .28s var(--ease), box-shadow .28s var(--ease), border-color .28s var(--ease);
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    }
    .search input{
      flex:1; width:100%;
      background:transparent; border:0; outline:none;
      color:var(--text); font-size:17px; letter-spacing:-.15px;
    }

    .section{
      margin:16px 0 10px;
      display:flex; align-items:center; gap:12px;
      color:var(--muted);
      font-size:11px; letter-spacing:.20em; text-transform:uppercase; font-weight:650;
      user-select:none;
    }
    .section .line{ flex:1; height:1px; background:var(--hair); }

    .grid{ display:grid; gap:26px 18px; grid-template-columns: repeat(6, 1fr); }
    @media (max-width:760px){ .grid{ grid-template-columns: repeat(4, 1fr); } }
    @media (max-width:520px){ .grid{ grid-template-columns: repeat(3, 1fr); } }

    .item{
      position:relative;
      display:flex; flex-direction:column; align-items:center; gap:10px;
      text-decoration:none; color:var(--muted);
      transition: transform .22s var(--ease);
      min-height: 92px;
      border-radius:18px;
      padding:6px 4px 8px;
    }
    .icon{
      width:56px; height:56px;
      display:grid; place-items:center;
      position:relative;
      border-radius:16px;
      background: var(--surface-strong);
      border:1px solid var(--hair);
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
      transition: transform .25s var(--ease), box-shadow .25s var(--ease), border-color .25s var(--ease);
      overflow:hidden;
    }
    .icon img{
      width:36px; height:36px; object-fit:contain;
      filter: grayscale(100%) opacity(var(--icon-default-opacity));
      transition: transform .35s var(--ease), filter .35s var(--ease), opacity .35s var(--ease);
    }
    body.theme-night .white-invert .icon img{
      filter: grayscale(100%) invert(1) brightness(2) opacity(1);
    }
    
    /* Hover & Active Effects */
    .item:hover .icon img, .item.is-active .icon img {
      filter: grayscale(0%) invert(0%) brightness(1) opacity(1) !important;
      transform: translateY(-6px);
    }
    .label{ font-size:13px; text-align:center; white-space:nowrap; transition: color .25s var(--ease); letter-spacing:-.12px; }

    #moreArea[aria-hidden="true"]{ display:none; }
    .morebtn{
      background: var(--surface); border: 1px solid var(--hair); color: var(--text);
      padding: 9px 24px; border-radius: 999px; cursor:pointer; font-size: 13px;
      opacity: .72; margin: 26px auto 0; display:block;
    }
  </style>
</head>

<body>
  <div class="bg-flow"><div class="blob"></div></div>

  <div class="wrap">
    <div class="top">
      <div class="top-left">
        <div id="greet" class="greet">Hello.</div>
        <div class="weather">
          <span id="temp">…</span>
          <span id="city">WEATHER</span>
          <span id="monitor-status"></span>
        </div>
      </div>
      <div class="clock" id="clock">00:00</div>
    </div>

    <div class="quote-area">
      <div id="quote" class="quote-text"></div>
      <div id="author" class="quote-author"></div>
    </div>

    <form class="search" id="searchForm">
      <input id="q" type="search" placeholder="Search..." autofocus />
    </form>

    <div class="section">ESSENTIALS<div class="line"></div></div>
    <div id="ess" class="grid"></div>

    <div id="moreArea" aria-hidden="true">
      <div class="section" style="margin-top:18px;">EXTENDED<div class="line"></div></div>
      <div id="ext" class="grid"></div>
    </div>

    <button class="morebtn" id="toggleBtn">More Icons</button>
  </div>

  <script>
    const ICON_BASE = "icons/";
    const FALLBACK  = "openai.svg";

    const QUOTES = [
      { t: "Stay hungry, stay foolish.", a: "Steve Jobs" },
      { t: "Simplicity is the ultimate sophistication.", a: "Leonardo da Vinci" },
      { t: "Design is how it works.", a: "Steve Jobs" },
      { t: "Make it simple, but significant.", a: "Don Draper" },
      { t: "Details matter. It’s worth waiting to get it right.", a: "Steve Jobs" }
    ];

    function imgTag(src, extraClass=""){
      const safe = ICON_BASE + encodeURIComponent(src);
      return `<img class="${extraClass}" src="${safe}" loading="lazy" decoding="async" onerror="this.src='${ICON_BASE}${FALLBACK}'">`;
    }

    const SITES = [
      { n:"ChatGPT", u:"https://chatgpt.com/", icons:["openai.svg"], c:"#10a37f", r:1, s:1.00, y:0, w:true },
      { n:"Claude", u:"https://claude.ai/", icons:["claude-color.svg"], c:"#d97757", r:1, s:1.02, y:0 },
      { n:"Copilot", u:"https://copilot.microsoft.com/", icons:["copilot-color.svg"], c:"#0078d4", r:1, s:1.02, y:0 },
      { n:"Gemini", u:"https://gemini.google.com/", gem:true, c:"#4e85ff", r:1, s:1.14, y:0, w:true },
      { n:"X", u:"https://x.com/", icons:["x.svg"], c:"#ffffff", r:1, s:1.06, y:0, w:true },
      { n:"GitHub", u:"https://github.com/", icons:["github.svg"], c:"#ffffff", r:1, s:1.02, y:0, w:true },
      { n:"Gmail", u:"https://mail.google.com/", icons:["google-gmail.svg"], c:"#ea4335", r:2, s:1.06, y:0 },
      { n:"Google", u:"https://www.google.com/", icons:["google-color.svg"], c:"#4285f4", r:2, s:1.05, y:0 },
      { n:"Notion", u:"https://www.notion.so/", icons:["notion.svg"], c:"#ffffff", r:2, s:1.06, y:0, w:true },
      { n:"Reddit", u:"https://www.reddit.com/", icons:["reddit.svg"], c:"#ff4500", r:2, s:1.05, y:0, w:true },
      { n:"Telegram", u:"https://web.telegram.org/", icons:["telegram.svg"], c:"#2aabee", r:2, s:1.05, y:0, w:true },
      { n:"YouTube", u:"https://www.youtube.com/", icons:["youtube_red.svg"], c:"#ff0000", r:2, s:1.08, y:0 },
      { n:"AWS", u:"https://aws.amazon.com/", icons:["aws.svg"], c:"#ff9900", r:3, s:1.06, y:0, w:true },
      { n:"Oracle", u:"https://www.oracle.com/", icons:["oracle.svg"], c:"#f80000", r:3, s:1.06, y:0 },
      { n:"Bing", u:"https://www.bing.com/", icons:["bing.svg"], c:"#008373", r:3, s:1.04, y:0, w:true },
      { n:"Microsoft", u:"https://www.microsoft.com/", icons:["microsoft.svg"], c:"#ffffff", r:3, s:1.06, y:0, w:true },
      { n:"Netflix", u:"https://www.netflix.com/", icons:["netflix-icon.svg"], c:"#e50914", r:3, s:1.06, y:0, w:true },
      { n:"Cloudflare", u:"https://dash.cloudflare.com/", icons:["cloudflare-color.svg"], c:"#f48120", r:3, s:1.03, y:0 },
      { n:"Apple", u:"https://www.apple.com/", icons:["apple.svg"], c:"#ffffff", r:3, s:1.08, y:0, w:true }
    ];

    function render(){
      const ess = document.getElementById("ess");
      const ext = document.getElementById("ext");
      ess.innerHTML = ext.innerHTML = "";
      SITES.forEach(s=>{
        const a = document.createElement("a");
        a.className = `item ${s.w ? "white-invert" : ""}`;
        a.href = s.u; a.target = "_blank"; a.style.setProperty("--brand-color", s.c || "#7C5CFF");
        if (s.s) a.style.setProperty("--s", String(s.s));
        if (typeof s.y === "number") a.style.setProperty("--y", `${s.y}px`);
        const iconHTML = s.gem ? `<div class="icon gemini">${imgTag("gemini.svg","g0")}${imgTag("gemini-color.svg","g1")}</div>` : `<div class="icon">${imgTag(s.icons[0])}</div>`;
        a.innerHTML = `${iconHTML}<div class="label">${s.n}</div>`;
        (s.r <= 2 ? ess : ext).appendChild(a);
      });
    }

    // ✅ 新增：哪吒监控函数
    async function updateNezha() {
      const statusEl = document.getElementById("monitor-status");
      try {
        const res = await fetch("/monitor-api");
        const data = await res.json();
        const servers = data.result || [];
        const total = servers.length;
        const online = servers.filter(s => s.status === "online" || s.state === 1).length;
        const isAllUp = online === total && total > 0;
        statusEl.innerHTML = `<span style="color:${isAllUp ? '#34A853' : '#EA4335'}">●</span> ${online}/${total} NODES`;
      } catch (e) {
        statusEl.innerHTML = `<span style="color:var(--muted)">●</span> OFFLINE`;
      }
    }

    function toggleMore(){
      const more = document.getElementById("moreArea");
      const btn  = document.getElementById("toggleBtn");
      const isOpen = more.getAttribute("aria-hidden") === "false";
      more.setAttribute("aria-hidden", String(isOpen));
      btn.textContent = isOpen ? "More Icons" : "Less Icons";
    }

    function updateTheme(){
      const h = new Date().getHours();
      const night = h >= 17 || h < 8;
      document.body.classList.toggle("theme-night", night);
      document.getElementById("greet").textContent = night ? "Good night." : (h < 12 ? "Good morning." : "Good afternoon.");
    }

    function tick(){
      const d = new Date();
      document.getElementById("clock").textContent = `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
    }

    async function updateWeather(){
      try{
        const ipRes = await fetch("https://ipapi.co/json/");
        const ip = await ipRes.json();
        const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${ip.latitude}&longitude=${ip.longitude}&current=temperature_2m`);
        const w = await wRes.json();
        document.getElementById("temp").textContent = `${Math.round(w.current.temperature_2m)}°C`;
        document.getElementById("city").textContent = String(ip.city || "LOCAL").toUpperCase();
      }catch{ document.getElementById("city").textContent = "WEATHER UNAVAILABLE"; }
    }

    document.getElementById("searchForm").onsubmit = (e)=>{
      e.preventDefault();
      const q = document.getElementById("q").value.trim();
      if(q) window.open("https://www.google.com/search?q=" + encodeURIComponent(q), "_blank");
    };

    document.getElementById("toggleBtn").addEventListener("click", toggleMore);

    // Init
    updateTheme(); tick(); render(); updateWeather();
    const q = QUOTES[Math.floor(Math.random() * QUOTES.length)];
    document.getElementById("quote").textContent = `"${q.t}"`;
    document.getElementById("author").textContent = q.a;
    
    // ✅ 启动监控
    updateNezha();

    setInterval(tick, 1000);
    setInterval(updateTheme, 60000);
    setInterval(updateWeather, 600000);
    setInterval(updateNezha, 30000); // 30秒同步一次监控
  </script>
</body>
</html>
