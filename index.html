<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>New Tab</title>

<style>
  :root{
    --bg: #0b1020;
    --glass: rgba(255,255,255,.06);
    --glass2: rgba(255,255,255,.08);
    --border: rgba(255,255,255,.10);
    --border2: rgba(255,255,255,.16);
    --text: rgba(255,255,255,.92);
    --muted: rgba(255,255,255,.58);
    --shadow: 0 16px 48px rgba(0,0,0,.45);
    --shadow2: 0 10px 26px rgba(0,0,0,.30);
    --maxw: 980px;
  }

  @media (prefers-color-scheme: light){
    :root{
      --bg: #f6f7fb;
      --glass: rgba(17,24,39,.04);
      --glass2: rgba(17,24,39,.06);
      --border: rgba(17,24,39,.10);
      --border2: rgba(17,24,39,.16);
      --text: rgba(17,24,39,.92);
      --muted: rgba(17,24,39,.54);
      --shadow: 0 18px 60px rgba(17,24,39,.10);
      --shadow2: 0 10px 24px rgba(17,24,39,.10);
    }
  }

  *{ box-sizing:border-box; }
  body{
    margin:0;
    min-height:100vh;
    color:var(--text);
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI",
      Roboto, Helvetica, Arial, "PingFang SC","Hiragino Sans GB","Microsoft YaHei";
    background:
      radial-gradient(1200px 700px at 18% 12%, rgba(99,102,241,.16), transparent 55%),
      radial-gradient(1000px 600px at 82% 18%, rgba(16,185,129,.12), transparent 55%),
      radial-gradient(900px 700px at 50% 105%, rgba(59,130,246,.14), transparent 60%),
      var(--bg);
  }

  .wrap{
    width:min(var(--maxw), 92vw);
    margin: 26px auto 46px;
    text-align:center;
  }

  /* 顶部：更轻的时间胶囊 */
  .top{
    display:flex;
    justify-content:center;
    margin: 8px 0 18px;
  }
  .chip{
    display:inline-flex;
    gap:10px;
    align-items:center;
    padding: 9px 13px;
    border-radius: 999px;
    background: var(--glass);
    border: 1px solid var(--border);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }
  .chip .t{
    font-weight: 760;
    letter-spacing: .2px;
  }
  .chip .d{
    color: var(--muted);
    font-weight: 600;
  }

  /* 主体：让搜索成为中心 */
  .center{
    margin-top: 14px;
  }

  /* 更像 Chrome 的搜索框：薄、干净 */
  .search{
    width:min(860px, 92vw);
    margin: 0 auto 24px;
    display:flex;
    align-items:center;
    gap:12px;
    padding: 12px 14px;
    border-radius: 999px;
    background: var(--glass);
    border: 1px solid var(--border);
    box-shadow: var(--shadow2);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    transition: border-color .15s ease, box-shadow .15s ease, background .15s ease;
  }
  .search:focus-within{
    border-color: var(--border2);
    box-shadow: 0 16px 40px rgba(0,0,0,.35);
    background: var(--glass2);
  }
  .search .sicon{ width:18px;height:18px; opacity:.70; }
  .search input{
    flex:1;
    border:0;
    outline:0;
    background:transparent;
    color:var(--text);
    font-size:16px;
  }
  .search button{
    border:0;
    cursor:pointer;
    padding: 9px 12px;
    border-radius: 999px;
    background: transparent;
    color: var(--muted);
    font-weight: 650;
  }
  .search button:hover{ color: var(--text); }
  .search button:active{ transform: translateY(1px); }

  /* 网格：更克制、间距更像原生新标签 */
  .grid{
    width:min(860px, 92vw);
    margin: 6px auto 0;
    display:grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 22px 16px;
    justify-items:center;
  }
  @media (max-width: 980px){ .grid{ grid-template-columns: repeat(4,1fr);} }
  @media (max-width: 560px){ .grid{ grid-template-columns: repeat(3,1fr); gap:18px 14px; } }

  .item{
    text-decoration:none;
    color:inherit;
    width: 120px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
  }

  /* 图标容器：轻边框、轻玻璃、少阴影 */
  .bubble{
    width: 66px;
    height: 66px;
    border-radius: 999px;
    background: var(--glass);
    border: 1px solid var(--border);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    display:grid;
    place-items:center;
    transition: transform .14s ease, box-shadow .14s ease, background .14s ease, border-color .14s ease;
  }
  .item:hover .bubble{
    transform: translateY(-2px);
    box-shadow: var(--shadow);
    background: var(--glass2);
    border-color: var(--border2);
  }

  /* plate：统一白底托起，避免暗色 icon 看不清 */
  .plate{
    width: 42px;
    height: 42px;
    border-radius: 14px;
    background: rgba(255,255,255,.94);
    display:grid;
    place-items:center;
    box-shadow:
      0 1px 0 rgba(255,255,255,.55) inset,
      0 8px 18px rgba(0,0,0,.18);
  }
  @media (prefers-color-scheme: light){
    .plate{
      background: rgba(255,255,255,.98);
      box-shadow:
        0 1px 0 rgba(255,255,255,.65) inset,
        0 10px 18px rgba(17,24,39,.10);
    }
  }

  .plate img{
    width: 30px;
    height: 30px;
    object-fit: contain;
    display:block;
    border-radius: 10px;
    image-rendering: -webkit-optimize-contrast;
  }

  .name{
    font-size: 13px;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: .1px;
  }

  .fallback{
    width:42px; height:42px;
    border-radius:14px;
    display:grid; place-items:center;
    font-weight: 850;
    color: rgba(17,24,39,.9);
    background: rgba(255,255,255,.94);
    box-shadow:
      0 1px 0 rgba(255,255,255,.55) inset,
      0 8px 18px rgba(0,0,0,.18);
  }

  .footer{
    margin-top: 28px;
    font-size: 12px;
    color: var(--muted);
    opacity: .55;
  }
</style>
</head>

<body>
  <div class="wrap">
    <div class="top">
      <div class="chip">
        <span class="t" id="time">--:--</span>
        <span class="d" id="date">----</span>
      </div>
    </div>

    <div class="center">
      <form class="search" id="searchForm">
        <svg class="sicon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z"
                stroke="currentColor" stroke-width="2" opacity=".9"/>
          <path d="M16.5 16.5 21 21"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity=".9"/>
        </svg>
        <input id="q" placeholder="Search Google or type a URL" autocomplete="off" />
        <button type="submit">Search</button>
      </form>

      <div class="grid" id="grid"></div>
      <div class="footer">nav.harveyi.com</div>
    </div>
  </div>

<script>
  // 搜索：URL 直接跳转，否则 Google
  document.getElementById("searchForm").addEventListener("submit", (e) => {
    e.preventDefault();
    const q = document.getElementById("q").value.trim();
    if (!q) return;
    const isUrl = /^(https?:\/\/)?([\w-]+\.)+[\w-]+(\/.*)?$/i.test(q);
    if (isUrl) location.href = q.startsWith("http") ? q : "https://" + q;
    else location.href = "https://www.google.com/search?q=" + encodeURIComponent(q);
  });

  // 时间/日期
  const pad = (n) => String(n).padStart(2, "0");
  function tick(){
    const d = new Date();
    document.getElementById("time").textContent = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
    const opt = { weekday:"short", year:"numeric", month:"short", day:"numeric" };
    document.getElementById("date").textContent = d.toLocaleDateString(undefined, opt);
  }
  tick(); setInterval(tick, 1000);

  // 统一稳定的 favicon（避免站点自己 403）
  const favicon = (u) => `https://www.google.com/s2/favicons?domain=${encodeURIComponent(u)}&sz=128`;

  const links = [
    { name:"Google", url:"https://google.com" },
    { name:"Gmail", url:"https://mail.google.com" },
    { name:"YouTube", url:"https://youtube.com" },
    { name:"GitHub", url:"https://github.com" },
    { name:"Microsoft", url:"https://www.microsoft.com" },
    { name:"ChatGPT", url:"https://chatgpt.com" },

    { name:"Oracle", url:"https://cloud.oracle.com" },
    { name:"AWS", url:"https://aws.amazon.com" },
    { name:"Cloudflare", url:"https://dash.cloudflare.com" },
    { name:"Vultr", url:"https://my.vultr.com" },
    { name:"RackNerd", url:"https://my.racknerd.com" },
    { name:"Wikipedia", url:"https://wikipedia.org" },

    { name:"X", url:"https://x.com" },
    { name:"Reddit", url:"https://reddit.com" },
    { name:"Telegram", url:"https://web.telegram.org" },
    { name:"Discord", url:"https://discord.com" },
    { name:"Netflix", url:"https://netflix.com" },
    { name:"Apple", url:"https://apple.com" },
  ];

  const grid = document.getElementById("grid");
  grid.innerHTML = links.map(l => `
    <a class="item" href="${l.url}" target="_blank" rel="noreferrer">
      <div class="bubble">
        <div class="plate">
          <img class="iconimg" src="${favicon(l.url)}" alt="${l.name}">
        </div>
      </div>
      <div class="name">${l.name}</div>
    </a>
  `).join("");

  // 图标失败：字母兜底
  document.querySelectorAll("img.iconimg").forEach(img => {
    img.addEventListener("error", () => {
      const name = img.getAttribute("alt") || "";
      const letter = (name.trim()[0] || "•").toUpperCase();
      const fb = document.createElement("div");
      fb.className = "fallback";
      fb.textContent = letter;
      img.replaceWith(fb);
    });
  });
</script>
</body>
</html>
