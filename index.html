<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Harveyi</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">

<style>
:root{
--ease:cubic-bezier(0.16,1,0.3,1);
--bg1:#09112A;
--bg2:#070A12;
--text:rgba(255,255,255,.92);
--muted:rgba(255,255,255,.45);
--hair:rgba(255,255,255,.08);
--search:rgba(255,255,255,.08);
--icon:rgba(255,255,255,.85);
}

*{box-sizing:border-box}
body{
margin:0;
font-family:Inter,-apple-system;
background:linear-gradient(180deg,var(--bg1),var(--bg2));
color:var(--text);
-webkit-font-smoothing:antialiased;
}

.wrap{
max-width:1000px;
margin:auto;
padding:36px 20px 60px;
}

.top{
display:flex;
justify-content:space-between;
margin-bottom:14px;
}

.clock{
font-family:"JetBrains Mono";
}

.search{
display:flex;
align-items:center;
gap:12px;
background:var(--search);
border:1px solid var(--hair);
padding:12px 18px;
border-radius:999px;
margin-bottom:30px;
transition:.3s var(--ease);
}

.search:focus-within{
box-shadow:0 0 0 1px rgba(124,92,255,.4);
}

.search input{
flex:1;
background:transparent;
border:0;
outline:none;
color:var(--text);
font-size:16px;
}

.section{
margin:22px 0 12px;
display:flex;
align-items:center;
gap:12px;
color:var(--muted);
font-size:12px;
letter-spacing:.2em;
text-transform:uppercase;
}

.section div{
flex:1;
height:1px;
background:var(--hair);
}

.grid{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:26px 18px;
}

@media(max-width:900px){.grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:600px){.grid{grid-template-columns:repeat(3,1fr)}}

.item{
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
text-decoration:none;
color:var(--muted);
transition:.25s var(--ease);
}

.icon{
width:54px;
height:54px;
display:grid;
place-items:center;
transition:.3s var(--ease);
}

.icon img{
width:36px;
height:36px;
filter:grayscale(100%) opacity(.6);
transition:.3s var(--ease);
}

.item:hover img{
filter:none;
transform:translateY(-4px);
}

.label{
font-size:13px;
}

.morebtn{
margin:32px auto 0;
display:block;
background:var(--search);
border:1px solid var(--hair);
color:var(--text);
padding:8px 24px;
border-radius:999px;
cursor:pointer;
}

</style>
</head>

<body>
<div class="wrap">

<div class="top">
<div>Good night.</div>
<div class="clock" id="clock"></div>
</div>

<form class="search" id="searchForm">
<input id="q" placeholder="Search...">
</form>

<div class="section">ESSENTIALS<div></div></div>
<div class="grid" id="ess"></div>

<div class="section">EXTENDED<div></div></div>
<div class="grid" id="ext"></div>

</div>

<script>

const ICON_BASE="icons/";
const FALLBACK="openai.svg";

function icon(name){
return `<img src="${ICON_BASE+name}" onerror="this.src='${ICON_BASE+FALLBACK}'">`;
}

const SITES=[

{n:"ChatGPT",u:"https://chatgpt.com/",i:"openai.svg",r:1},
{n:"Claude",u:"https://claude.ai/",i:"claude-color.svg",r:1},
{n:"Copilot",u:"https://copilot.microsoft.com/",i:"copilot-color.svg",r:1},
{n:"Gemini",u:"https://gemini.google.com/",i:"gemini-color.svg",r:1},
{n:"Cloudflare",u:"https://dash.cloudflare.com/",i:"cloudflare-color.svg",r:1},
{n:"GitHub",u:"https://github.com/",i:"github.svg",r:1},

{n:"Gmail",u:"https://mail.google.com/",i:"google-gmail.svg",r:2},
{n:"Google",u:"https://google.com",i:"google-color.svg",r:2},
{n:"Google Cloud",u:"https://console.cloud.google.com/",i:"googlecloud-color.svg",r:2},
{n:"Google Drive",u:"https://drive.google.com/",i:"google-drive.svg",r:2},
{n:"Google Maps",u:"https://maps.google.com/",i:"google-maps.svg",r:2},
{n:"YouTube",u:"https://youtube.com/",i:"youtube_red.svg",r:2},

{n:"AWS",u:"https://console.aws.amazon.com/",i:"aws.svg",r:3},
{n:"Azure",u:"https://portal.azure.com/",i:"azure.svg",r:3},
{n:"Bing",u:"https://bing.com/",i:"bing.svg",r:3},
{n:"Microsoft",u:"https://microsoft.com/",i:"microsoft.svg",r:3},
{n:"Netflix",u:"https://netflix.com/",i:"netflix-icon.svg",r:3},
{n:"Spotify",u:"https://spotify.com/",i:"spotify-icon.svg",r:3},

{n:"X",u:"https://x.com/",i:"x.svg",r:4},
{n:"Facebook",u:"https://facebook.com/",i:"facebook.svg",r:4},
{n:"Reddit",u:"https://reddit.com/",i:"reddit-color.svg",r:4},
{n:"Telegram",u:"https://web.telegram.org/",i:"telegram.svg",r:4},
{n:"Apple",u:"https://apple.com/",i:"apple.svg",r:4}

];

function render(){
const ess=document.getElementById("ess");
const ext=document.getElementById("ext");

ess.innerHTML="";
ext.innerHTML="";

SITES.forEach(s=>{
const el=document.createElement("a");
el.className="item";
el.href=s.u;
el.target="_blank";
el.innerHTML=`<div class="icon">${icon(s.i)}</div><div class="label">${s.n}</div>`;
(s.r<=2?ess:ext).appendChild(el);
});
}

function clock(){
const d=new Date();
document.getElementById("clock").textContent=
String(d.getHours()).padStart(2,"0")+":"+
String(d.getMinutes()).padStart(2,"0");
}
setInterval(clock,1000);
clock();
render();

</script>
</body>
</html>
