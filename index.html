<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>Harvey — Home</title>
<link rel="icon" href="data:,">
<meta name="theme-color" content="#070A12">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">

<style>
:root{
--bg0:#070A12;
--bg1:#09112A;
--text:rgba(255,255,255,.92);
--muted:rgba(255,255,255,.6);
--hair:rgba(255,255,255,.08);
--ease:cubic-bezier(.34,1.56,.64,1);
--ease2:cubic-bezier(.22,.61,.36,1);
}

*{box-sizing:border-box}
body{
margin:0;
font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
-webkit-font-smoothing:antialiased;
background:
radial-gradient(1000px 700px at 20% 20%, rgba(100,80,255,.18), transparent 55%),
radial-gradient(900px 700px at 80% 30%, rgba(0,200,255,.12), transparent 55%),
linear-gradient(180deg,var(--bg1),var(--bg0));
color:var(--text);
min-height:100vh;
display:flex;
justify-content:center;
padding:40px 20px;
}

.container{
width:min(980px,100%);
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
}

.greet{
font-size:18px;
opacity:.8;
}

.clock{
font-family:"JetBrains Mono",monospace;
font-weight:600;
letter-spacing:.02em;
}

.search{
position:relative;
display:flex;
align-items:center;
padding:14px 18px;
border-radius:999px;
border:1px solid var(--hair);
background:rgba(255,255,255,.05);
backdrop-filter:blur(12px);
margin-bottom:26px;
transition:.25s var(--ease2);
}

.search:focus-within{
box-shadow:0 0 0 6px rgba(124,92,255,.12);
border-color:rgba(124,92,255,.4);
}

.search input{
flex:1;
background:transparent;
border:0;
outline:0;
color:var(--text);
font-size:18px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(110px,1fr));
gap:30px 26px;
}

.item{
text-align:center;
text-decoration:none;
color:var(--muted);
position:relative;
padding:8px;
border-radius:14px;
transition:.25s var(--ease);
}

.icon{
width:54px;
height:54px;
margin:0 auto 10px;
transition:.3s var(--ease);
filter:grayscale(100%) opacity(.65);
}

.icon img{
width:100%;
height:100%;
object-fit:contain;
border-radius:12px;
}

.item:hover .icon,
.item:focus-visible .icon{
filter:none;
transform:translateY(-4px);
}

.item:hover .label,
.item:focus-visible .label{
color:#fff;
}

.item:focus-visible{
box-shadow:0 0 0 1px rgba(255,255,255,.2),0 0 0 6px rgba(124,92,255,.12);
outline:none;
}

.label{
font-size:13px;
transition:.2s var(--ease2);
}

.kbd{
position:absolute;
top:-6px;
right:2px;
font-family:"JetBrains Mono",monospace;
font-size:11px;
padding:4px 7px;
border-radius:10px;
background:rgba(0,0,0,.3);
border:1px solid rgba(255,255,255,.15);
opacity:0;
transform:translateY(-6px);
transition:.18s var(--ease);
pointer-events:none;
}

.show-hotkeys .kbd{
opacity:1;
transform:translateY(0);
}

.footer{
text-align:center;
margin-top:30px;
opacity:.25;
font-size:12px;
letter-spacing:.05em;
}
</style>
</head>

<body>
<div class="container">

<div class="top">
<div class="greet" id="greet"></div>
<div class="clock" id="clock"></div>
</div>

<form class="search" id="searchForm">
<input id="q" placeholder="Search...">
</form>

<div class="grid" id="grid"></div>

<div class="footer">harveyi.com</div>

</div>

<script>
const sites=[
{name:"Gmail",url:"https://mail.google.com/",key:"M"},
{name:"ChatGPT",url:"https://chatgpt.com/",key:"C"},
{name:"GitHub",url:"https://github.com/",key:"H"},
{name:"Cloudflare",url:"https://dash.cloudflare.com/",key:"F"},
{name:"Google",url:"https://google.com/",key:"G"},
{name:"YouTube",url:"https://youtube.com/",key:"Y"},
{name:"Drive",url:"https://drive.google.com/",key:"D"},
{name:"Calendar",url:"https://calendar.google.com/",key:"K"},
{name:"Microsoft",url:"https://microsoft.com/",key:"S"},
{name:"Vultr",url:"https://my.vultr.com/",key:"V"},
{name:"Oracle",url:"https://cloud.oracle.com/",key:"O"},
{name:"RackNerd",url:"https://my.racknerd.com/",key:"R"}
];

const grid=document.getElementById("grid");

sites.forEach((s,i)=>{
const a=document.createElement("a");
a.className="item";
a.href=s.url;
a.target="_blank";
a.innerHTML=`
<span class="kbd">${s.key}</span>
<div class="icon">
<img src="https://www.google.com/s2/favicons?domain=${new URL(s.url).hostname}&sz=128">
</div>
<div class="label">${s.name}</div>
`;
grid.appendChild(a);
});

function updateTime(){
const d=new Date();
const h=d.getHours();
const m=d.getMinutes();
clock.textContent=String(h).padStart(2,"0")+":"+String(m).padStart(2,"0");

let g="Hello.";
if(h<12) g="Good morning.";
else if(h<18) g="Good afternoon.";
else if(h<22) g="Good evening.";
else g="Good night.";
greet.textContent=g;
}
setInterval(updateTime,10000);
updateTime();

q.focus();

searchForm.addEventListener("submit",e=>{
e.preventDefault();
const val=q.value.trim();
if(!val)return;
if(val.startsWith("/y "))
window.open("https://youtube.com/results?search_query="+encodeURIComponent(val.slice(3)));
else if(val.startsWith("/gh "))
window.open("https://github.com/search?q="+encodeURIComponent(val.slice(4)));
else
window.open("https://google.com/search?q="+encodeURIComponent(val));
});

window.addEventListener("keydown",e=>{
if(e.altKey)document.body.classList.add("show-hotkeys");
});
window.addEventListener("keyup",e=>{
if(!e.altKey)document.body.classList.remove("show-hotkeys");
});
</script>

</body>
</html>
