<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Harveyi</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#f5f6fb" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />

  <style>
    :root{
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
      --bg-top:#fbfbfd;
      --bg-bottom:#eef1f7;
      --text:#18181b;
      --muted:rgba(24,24,27,0.58);
      --muted-strong:rgba(24,24,27,0.72);
      --hair:rgba(24,24,27,0.08);
      --surface:rgba(255,255,255,0.62);
      --surface-strong:rgba(255,255,255,0.84);
      --panel:rgba(255,255,255,0.72);
      --focus:rgba(0,122,255,0.24);
      --focus-border:rgba(0,122,255,0.42);
      --icon-default-opacity:0.68;
      --glow-opacity:0.14;
      --shadow-soft:0 12px 34px rgba(10,16,32,0.06);
      --shadow-panel:0 22px 60px rgba(10,16,32,0.08);
      --shadow-card:0 10px 22px rgba(10,16,32,0.07);
    }

    body.theme-night{
      --bg-top:#091018;
      --bg-bottom:#050913;
      --text:rgba(255,255,255,0.94);
      --muted:rgba(255,255,255,0.58);
      --muted-strong:rgba(255,255,255,0.74);
      --hair:rgba(255,255,255,0.10);
      --surface:rgba(17,23,34,0.62);
      --surface-strong:rgba(255,255,255,0.06);
      --panel:rgba(12,16,24,0.68);
      --focus:rgba(10,132,255,0.28);
      --focus-border:rgba(10,132,255,0.48);
      --icon-default-opacity:0.92;
      --glow-opacity:0.24;
      --shadow-soft:0 12px 36px rgba(0,0,0,0.22);
      --shadow-panel:0 28px 72px rgba(0,0,0,0.30);
      --shadow-card:0 14px 30px rgba(0,0,0,0.18);
    }

    *{ box-sizing:border-box; }
    html,body{ min-height:100%; }
    body{
      margin:0;
      min-height:100vh;
      font-family:Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 18% 18%, rgba(124,92,255,0.10), transparent 28%),
        radial-gradient(circle at 82% 12%, rgba(0,122,255,0.08), transparent 24%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
      overflow-x:hidden;
      transition:background 900ms var(--ease), color 900ms var(--ease);
    }

    .bg-flow{
      position:fixed;
      inset:-20%;
      pointer-events:none;
      z-index:-2;
      filter:blur(120px);
      opacity:.34;
    }
    .blob{
      position:absolute;
      border-radius:999px;
      animation:drift 70s cubic-bezier(.45, 0, .55, 1) infinite alternate;
      background:radial-gradient(circle, var(--brand-color), transparent 64%);
    }
    .blob-a{
      --brand-color:rgba(124,92,255,0.48);
      width:66vmax;
      height:66vmax;
      left:-6vmax;
      top:-8vmax;
    }
    .blob-b{
      --brand-color:rgba(0,122,255,0.38);
      width:54vmax;
      height:54vmax;
      right:-8vmax;
      top:8vmax;
      animation-duration:82s;
    }

    @keyframes drift{
      from{ transform:translate(-6%, -8%) rotate(0deg); }
      to{ transform:translate(8%, 10%) rotate(12deg); }
    }

    @media (prefers-reduced-motion: reduce){
      *,*::before,*::after{ animation:none !important; transition:none !important; scroll-behavior:auto !important; }
      .bg-flow{ display:none; }
    }

    .wrap{
      width:min(1080px, calc(100% - 32px));
      margin:0 auto;
      padding:calc(26px + env(safe-area-inset-top)) 0 56px;
    }

    .hero{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:18px;
      margin-bottom:22px;
    }

    .hero-main{
      min-width:0;
      flex:1;
    }

    .greet{
      font-size:clamp(28px, 5vw, 38px);
      line-height:1.04;
      font-weight:700;
      letter-spacing:-0.04em;
      margin:0 0 12px;
    }

    .meta-row{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      min-height:36px;
    }

    .meta-pill,
    .time-card,
    .search{
      backdrop-filter:blur(22px);
      -webkit-backdrop-filter:blur(22px);
    }

    .meta-pill{
      display:inline-flex;
      align-items:center;
      gap:10px;
      min-height:34px;
      padding:0 14px;
      border-radius:999px;
      border:1px solid var(--hair);
      background:var(--surface);
      color:var(--muted-strong);
      font-size:13px;
      box-shadow:var(--shadow-soft);
      white-space:nowrap;
      max-width:100%;
    }

    .meta-pill #temp{ min-width:3.2ch; }
    .meta-pill #city{ min-width:7ch; }
    .meta-pill #condition{ min-width:8ch; }
    .sep{
      width:4px;
      height:4px;
      border-radius:999px;
      background:currentColor;
      opacity:.32;
      flex:none;
    }

    .time-card{
      flex:none;
      min-width:156px;
      padding:14px 18px 15px;
      border-radius:24px;
      border:1px solid var(--hair);
      background:var(--surface);
      box-shadow:var(--shadow-soft);
      text-align:right;
    }

    .time-label{
      margin-bottom:6px;
      font-size:11px;
      font-weight:650;
      letter-spacing:0.18em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .clock{
      font-family:"JetBrains Mono", ui-monospace, monospace;
      font-size:clamp(28px, 4vw, 34px);
      line-height:1;
      font-weight:600;
      letter-spacing:-0.05em;
      white-space:nowrap;
    }

    .search-shell{
      margin-bottom:28px;
    }

    .search{
      display:flex;
      align-items:center;
      gap:14px;
      min-height:68px;
      padding:10px 12px 10px 20px;
      border-radius:28px;
      border:1px solid var(--hair);
      background:var(--panel);
      box-shadow:var(--shadow-panel);
      transition:transform .3s var(--ease), border-color .3s var(--ease), box-shadow .3s var(--ease);
    }

    .search:focus-within{
      transform:translateY(-1px) scale(1.005);
      border-color:var(--focus-border);
      box-shadow:0 0 0 4px var(--focus), var(--shadow-panel);
    }

    .search-icon{
      width:22px;
      height:22px;
      color:var(--muted);
      flex:none;
    }

    .search input{
      flex:1;
      width:100%;
      min-width:0;
      border:0;
      outline:none;
      background:transparent;
      color:var(--text);
      font-size:18px;
      letter-spacing:-0.02em;
      padding:0;
    }

    .search input::placeholder{
      color:var(--muted);
    }

    .search button{
      display:grid;
      place-items:center;
      width:48px;
      height:48px;
      border-radius:16px;
      border:1px solid transparent;
      background:transparent;
      color:var(--muted-strong);
      cursor:pointer;
      flex:none;
      transition:transform .22s var(--ease), background .22s var(--ease), color .22s var(--ease), border-color .22s var(--ease);
    }

    .search button:hover,
    .search button:focus-visible{
      outline:none;
      color:var(--text);
      background:var(--surface-strong);
      border-color:var(--focus-border);
      transform:scale(1.04);
    }

    .search-note{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:10px 6px 0;
      font-size:12px;
      color:var(--muted);
      letter-spacing:-0.01em;
    }

    .search-note-right{
      display:inline-flex;
      align-items:center;
      gap:8px;
      white-space:nowrap;
    }

    .kbd{
      display:inline-grid;
      place-items:center;
      min-width:24px;
      height:24px;
      padding:0 7px;
      border-radius:8px;
      border:1px solid var(--hair);
      background:var(--surface);
      box-shadow:var(--shadow-soft);
      font-family:"JetBrains Mono", ui-monospace, monospace;
      font-size:11px;
      color:var(--muted-strong);
    }

    .section-block{
      margin-top:26px;
    }

    .section-head{
      display:flex;
      align-items:center;
      gap:16px;
      margin-bottom:16px;
    }

    .section-copy{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
      flex:1;
    }

    .section-title{
      font-size:12px;
      font-weight:700;
      letter-spacing:0.20em;
      text-transform:uppercase;
      color:var(--muted);
      white-space:nowrap;
    }

    .section-line{
      height:1px;
      flex:1;
      background:var(--hair);
    }

    .section-toggle{
      flex:none;
      display:inline-flex;
      align-items:center;
      gap:8px;
      min-height:36px;
      padding:0 14px;
      border-radius:999px;
      border:1px solid var(--hair);
      background:var(--surface);
      color:var(--text);
      cursor:pointer;
      font-size:13px;
      font-weight:600;
      letter-spacing:-0.01em;
      box-shadow:var(--shadow-soft);
      transition:transform .22s var(--ease), opacity .22s var(--ease), border-color .22s var(--ease), background .22s var(--ease);
    }

    .section-toggle:hover,
    .section-toggle:focus-visible{
      outline:none;
      transform:translateY(-1px);
      border-color:var(--focus-border);
      background:var(--surface-strong);
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(104px, 1fr));
      gap:24px 18px;
    }

    .item{
      position:relative;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:12px;
      min-height:106px;
      padding:8px 4px 10px;
      text-decoration:none;
      color:var(--muted);
      border-radius:20px;
      isolation:isolate;
      -webkit-tap-highlight-color:transparent;
      transition:transform .24s var(--ease);
    }

    .item:active{
      transform:scale(0.97);
      transition-duration:.08s;
    }

    .item:focus-visible{ outline:none; }

    .item:focus-visible .icon{
      border-color:var(--focus-border);
      box-shadow:0 0 0 4px var(--focus), 0 16px 34px rgba(0,0,0,0.12);
    }

    .item:focus-visible .label,
    .item.is-active .label{
      color:var(--text);
    }

    .icon{
      width:60px;
      height:60px;
      position:relative;
      display:grid;
      place-items:center;
      overflow:hidden;
      border-radius:18px;
      border:1px solid var(--hair);
      background:var(--surface-strong);
      box-shadow:var(--shadow-card);
      transition:transform .26s var(--ease), box-shadow .26s var(--ease), border-color .26s var(--ease);
    }

    .icon img{
      width:38px;
      height:38px;
      object-fit:contain;
      transform:translateY(var(--y, 0px)) scale(var(--s, 1));
      filter:grayscale(100%) opacity(var(--icon-default-opacity));
      transition:transform .35s var(--ease), filter .35s var(--ease), opacity .35s var(--ease);
      will-change:filter, transform, opacity;
    }

    body.theme-night .white-invert .icon img{
      filter:grayscale(100%) invert(1) brightness(2) opacity(1);
    }

    .icon.gemini img.g1{ position:absolute; opacity:0; }
    .item:hover .icon.gemini img.g0,
    .item.is-active .icon.gemini img.g0{ opacity:0; }
    .item:hover .icon.gemini img.g1,
    .item.is-active .icon.gemini img.g1{ opacity:1; }

    @media (hover:hover) and (pointer:fine){
      .item:hover{ transform:translateY(-2px); }
      .item:hover .icon,
      .item.is-active .icon{
        box-shadow:0 18px 36px rgba(0,0,0,0.12);
      }
      .item:hover .icon img,
      .item.is-active .icon img{
        filter:grayscale(0%) invert(0%) brightness(1) opacity(1) !important;
        transform:translateY(calc(var(--y, 0px) - 6px)) scale(var(--s, 1));
      }
      .item:hover .icon::after,
      .item.is-active .icon::after{
        content:"";
        position:absolute;
        inset:-14px;
        border-radius:22px;
        z-index:-1;
        filter:blur(34px);
        opacity:var(--glow-opacity);
        background:radial-gradient(circle, var(--brand-color, #7c5cff), transparent 72%);
      }
      .item:hover .label{ color:var(--text); }
    }

    .label{
      width:100%;
      max-width:94px;
      font-size:12.8px;
      line-height:1.24;
      text-align:center;
      letter-spacing:-0.02em;
      color:inherit;
      overflow:hidden;
      display:-webkit-box;
      -webkit-box-orient:vertical;
      -webkit-line-clamp:2;
    }

    #moreArea[hidden]{ display:none; }

    @media (max-width:720px){
      .hero{
        align-items:stretch;
        flex-direction:column;
      }
      .time-card{
        width:100%;
        text-align:left;
      }
    }

    @media (max-width:540px){
      .wrap{
        width:min(100% - 24px, 1080px);
        padding-top:calc(20px + env(safe-area-inset-top));
      }
      .greet{ margin-bottom:10px; }
      .search{
        min-height:62px;
        padding-left:16px;
      }
      .search input{ font-size:17px; }
      .search-note{
        flex-wrap:wrap;
        justify-content:flex-start;
      }
      .grid{
        grid-template-columns:repeat(auto-fit, minmax(92px, 1fr));
        gap:22px 12px;
      }
      .section-head{
        align-items:flex-start;
        flex-wrap:wrap;
      }
    }
  </style>
</head>
<body>
  <div class="bg-flow" aria-hidden="true">
    <div class="blob blob-a"></div>
    <div class="blob blob-b"></div>
  </div>

  <div class="wrap">
    <header class="hero">
      <div class="hero-main">
        <div id="greet" class="greet">Hello.</div>
        <div class="meta-row">
          <div class="meta-pill" aria-live="polite">
            <span id="temp">…</span>
            <span class="sep" aria-hidden="true"></span>
            <span id="city">WEATHER</span>
            <span class="sep" aria-hidden="true"></span>
            <span id="condition">--</span>
          </div>
        </div>
      </div>

      <div class="time-card" aria-label="Current time">
        <div class="time-label">Local time</div>
        <div class="clock" id="clock">00:00</div>
      </div>
    </header>

    <section class="search-shell" aria-label="Quick search">
      <form class="search" id="searchForm" autocomplete="off" role="search" aria-label="Search the web">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <circle cx="11" cy="11" r="6.5" stroke="currentColor" stroke-width="1.8"/>
        </svg>
        <input
          id="q"
          type="search"
          inputmode="search"
          autocomplete="off"
          autocapitalize="none"
          spellcheck="false"
          placeholder="Search web, tools, docs..."
          aria-label="Search query"
        />
        <button type="submit" aria-label="Search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M5 12h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M13 6l6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </form>
      <div class="search-note">
        <span>Google search with one clean jump.</span>
        <span class="search-note-right"><span class="kbd">/</span> Focus search</span>
      </div>
    </section>

    <section class="section-block">
      <div class="section-head">
        <div class="section-copy">
          <span class="section-title">Favorites</span>
          <span class="section-line"></span>
        </div>
        <button class="section-toggle" id="toggleBtn" aria-expanded="false" aria-controls="moreArea" type="button">Show More</button>
      </div>
      <div id="ess" class="grid" role="list"></div>
    </section>

    <section class="section-block" id="moreArea" hidden>
      <div class="section-head">
        <div class="section-copy">
          <span class="section-title">More</span>
          <span class="section-line"></span>
        </div>
      </div>
      <div id="ext" class="grid" role="list"></div>
    </section>
  </div>

  <script>
    const ICON_BASE = "icons/";
    const SEARCH_ENGINE = "https://www.google.com/search?q=";
    const WEATHER_REFRESH_MS = 10 * 60 * 1000;
    const LOCATION_CACHE_MS = 30 * 60 * 1000;
    const STORAGE_KEY_MORE_OPEN = "harveyi-more-open";
    const FALLBACK_ICON = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" width="72" height="72" viewBox="0 0 72 72">
        <defs>
          <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0%" stop-color="#8bb3ff"/>
            <stop offset="100%" stop-color="#7c5cff"/>
          </linearGradient>
        </defs>
        <rect x="6" y="6" width="60" height="60" rx="18" fill="url(#g)" opacity=".18"/>
        <circle cx="36" cy="36" r="18" fill="url(#g)" opacity=".9"/>
      </svg>
    `);

    const WEATHER_TEXT = {
      0: "Clear",
      1: "Mainly clear",
      2: "Partly cloudy",
      3: "Overcast",
      45: "Fog",
      48: "Rime fog",
      51: "Light drizzle",
      53: "Drizzle",
      55: "Dense drizzle",
      56: "Freezing drizzle",
      57: "Dense freezing drizzle",
      61: "Light rain",
      63: "Rain",
      65: "Heavy rain",
      66: "Freezing rain",
      67: "Heavy freezing rain",
      71: "Light snow",
      73: "Snow",
      75: "Heavy snow",
      77: "Snow grains",
      80: "Rain showers",
      81: "Heavy showers",
      82: "Violent showers",
      85: "Snow showers",
      86: "Heavy snow showers",
      95: "Thunderstorm",
      96: "Storm + hail",
      99: "Severe storm + hail"
    };

    const SITES = [
      { name:"ChatGPT", url:"https://chatgpt.com/", icon:"openai.svg", color:"#10a37f", section:"favorites", scale:1.00, offsetY:0, invertInDark:true },
      { name:"Claude", url:"https://claude.ai/", icon:"claude-color.svg", color:"#d97757", section:"favorites", scale:1.02, offsetY:0 },
      { name:"Copilot", url:"https://copilot.microsoft.com/", icon:"copilot-color.svg", color:"#0078d4", section:"favorites", scale:1.02, offsetY:0 },
      { name:"Gemini", url:"https://gemini.google.com/", icons:["gemini.svg", "gemini-color.svg"], dual:true, color:"#4e85ff", section:"favorites", scale:1.14, offsetY:0, invertInDark:true },
      { name:"X", url:"https://x.com/", icon:"x.svg", color:"#ffffff", section:"favorites", scale:1.06, offsetY:0, invertInDark:true },
      { name:"GitHub", url:"https://github.com/", icon:"github.svg", color:"#ffffff", section:"favorites", scale:1.02, offsetY:0, invertInDark:true },

      { name:"Gmail", url:"https://mail.google.com/", icon:"google-gmail.svg", color:"#ea4335", section:"favorites", scale:1.06, offsetY:0 },
      { name:"Google", url:"https://www.google.com/", icon:"google-color.svg", color:"#4285f4", section:"favorites", scale:1.05, offsetY:0 },
      { name:"Notion", url:"https://www.notion.so/", icon:"notion.svg", color:"#ffffff", section:"favorites", scale:1.06, offsetY:0, invertInDark:true },
      { name:"Reddit", url:"https://www.reddit.com/", icon:"reddit.svg", color:"#ff4500", section:"favorites", scale:1.05, offsetY:0, invertInDark:true },
      { name:"Telegram", url:"https://web.telegram.org/", icon:"telegram.svg", color:"#2aabee", section:"favorites", scale:1.05, offsetY:0, invertInDark:true },
      { name:"YouTube", url:"https://www.youtube.com/", icon:"youtube_red.svg", color:"#ff0000", section:"favorites", scale:1.08, offsetY:0 },

      { name:"AWS", url:"https://aws.amazon.com/", icon:"aws.svg", color:"#ff9900", section:"more", scale:1.06, offsetY:0, invertInDark:true },
      { name:"Oracle", url:"https://www.oracle.com/cloud/sign-in.html/", icon:"oracle.svg", color:"#f80000", section:"more", scale:1.06, offsetY:0 },
      { name:"Bing", url:"https://www.bing.com/", icon:"bing.svg", color:"#008373", section:"more", scale:1.04, offsetY:0, invertInDark:true },
      { name:"Microsoft", url:"https://www.microsoft.com/", icon:"microsoft.svg", color:"#ffffff", section:"more", scale:1.06, offsetY:0, invertInDark:true },
      { name:"Netflix", url:"https://www.netflix.com/", icon:"netflix-icon.svg", color:"#e50914", section:"more", scale:1.06, offsetY:0, invertInDark:true },
      { name:"Cloudflare", url:"https://dash.cloudflare.com/", icon:"cloudflare-color.svg", color:"#f48120", section:"more", scale:1.03, offsetY:0 },
      { name:"Apple", url:"https://www.apple.com/", icon:"apple.svg", color:"#ffffff", section:"more", scale:1.08, offsetY:0, invertInDark:true }
    ];

    let weatherTimer = null;
    let clockTimer = null;
    let locationCache = null;

    function iconPath(filename){
      return ICON_BASE + encodeURIComponent(filename);
    }

    function createIconImage(filename, extraClass = ""){
      const img = document.createElement("img");
      if (extraClass) img.className = extraClass;
      img.src = iconPath(filename);
      img.loading = "lazy";
      img.decoding = "async";
      img.alt = "";
      img.addEventListener("error", () => {
        img.src = FALLBACK_ICON;
      }, { once:true });
      return img;
    }

    function createItem(site){
      const a = document.createElement("a");
      a.className = `item ${site.invertInDark ? "white-invert" : ""}`;
      a.href = site.url;
      a.target = "_blank";
      a.rel = "noopener noreferrer";
      a.role = "listitem";
      a.setAttribute("aria-label", `Open ${site.name}`);
      a.style.setProperty("--brand-color", site.color || "#7c5cff");
      a.style.setProperty("--s", String(site.scale ?? 1));
      a.style.setProperty("--y", `${site.offsetY ?? 0}px`);

      const icon = document.createElement("div");
      icon.className = `icon${site.dual ? " gemini" : ""}`;
      icon.setAttribute("aria-hidden", "true");

      if (site.dual && Array.isArray(site.icons)){
        icon.append(createIconImage(site.icons[0], "g0"), createIconImage(site.icons[1], "g1"));
      } else {
        icon.append(createIconImage(site.icon));
      }

      const label = document.createElement("div");
      label.className = "label";
      label.textContent = site.name;

      a.append(icon, label);
      return a;
    }

    function render(){
      const favorites = document.getElementById("ess");
      const more = document.getElementById("ext");
      const favoritesFrag = document.createDocumentFragment();
      const moreFrag = document.createDocumentFragment();

      for (const site of SITES){
        const item = createItem(site);
        (site.section === "more" ? moreFrag : favoritesFrag).appendChild(item);
      }

      favorites.replaceChildren(favoritesFrag);
      more.replaceChildren(moreFrag);
    }

    function setMoreState(isOpen, { persist = true } = {}){
      const moreArea = document.getElementById("moreArea");
      const toggleBtn = document.getElementById("toggleBtn");
      moreArea.hidden = !isOpen;
      toggleBtn.setAttribute("aria-expanded", String(isOpen));
      toggleBtn.textContent = isOpen ? "Show Less" : "Show More";
      if (persist){
        try { localStorage.setItem(STORAGE_KEY_MORE_OPEN, isOpen ? "1" : "0"); } catch {}
      }
    }

    function restoreMoreState(){
      let isOpen = false;
      try {
        isOpen = localStorage.getItem(STORAGE_KEY_MORE_OPEN) === "1";
      } catch {}
      setMoreState(isOpen, { persist:false });
    }

    function toggleMore(){
      const isOpen = document.getElementById("moreArea").hidden;
      setMoreState(isOpen);
    }

    function updateGreeting(now = new Date()){
      const hour = now.getHours();
      let text = "Hello.";
      if (hour < 5) text = "Still up?";
      else if (hour < 12) text = "Good morning.";
      else if (hour < 17) text = "Good afternoon.";
      else if (hour < 22) text = "Good evening.";
      else text = "Good night.";
      document.getElementById("greet").textContent = text;
    }

    function shouldUseDarkTheme(){
      const media = window.matchMedia ? window.matchMedia("(prefers-color-scheme: dark)") : null;
      if (media && typeof media.matches === "boolean") return media.matches;
      const hour = new Date().getHours();
      return hour >= 18 || hour < 7;
    }

    function updateTheme(){
      const isDark = shouldUseDarkTheme();
      document.body.classList.toggle("theme-night", isDark);
      document.documentElement.style.colorScheme = isDark ? "dark" : "light";
      const themeMeta = document.querySelector('meta[name="theme-color"]');
      if (themeMeta) themeMeta.setAttribute("content", isDark ? "#091018" : "#f5f6fb");
    }

    function formatTime(date){
      return new Intl.DateTimeFormat(navigator.language || "en-US", {
        hour: "2-digit",
        minute: "2-digit",
        hour12: false,
        hourCycle: "h23"
      }).format(date);
    }

    function updateClock(){
      const now = new Date();
      document.getElementById("clock").textContent = formatTime(now);
      updateGreeting(now);
      updateTheme();
    }

    function scheduleClock(){
      updateClock();
      clearTimeout(clockTimer);
      const now = new Date();
      const msUntilNextMinute = ((60 - now.getSeconds()) * 1000) - now.getMilliseconds() + 20;
      clockTimer = setTimeout(scheduleClock, msUntilNextMinute);
    }

    async function fetchJSON(url, { timeout = 5000 } = {}){
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeout);
      try {
        const response = await fetch(url, {
          cache: "no-store",
          signal: controller.signal,
          headers: { "Accept": "application/json" }
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json();
      } finally {
        clearTimeout(timer);
      }
    }

    async function getGrantedGeolocation(){
      if (!("geolocation" in navigator)) return null;
      try {
        if (!("permissions" in navigator) || !navigator.permissions.query) return null;
        const status = await navigator.permissions.query({ name: "geolocation" });
        if (status.state !== "granted") return null;
      } catch {
        return null;
      }

      return new Promise((resolve) => {
        navigator.geolocation.getCurrentPosition(
          (pos) => resolve({
            latitude: pos.coords.latitude,
            longitude: pos.coords.longitude,
            city: "LOCAL"
          }),
          () => resolve(null),
          {
            enableHighAccuracy: false,
            timeout: 4000,
            maximumAge: LOCATION_CACHE_MS
          }
        );
      });
    }

    async function getLocation(){
      if (locationCache && (Date.now() - locationCache.at) < LOCATION_CACHE_MS){
        return locationCache.data;
      }

      const preciseLocation = await getGrantedGeolocation();
      if (preciseLocation){
        locationCache = { at: Date.now(), data: preciseLocation };
        return preciseLocation;
      }

      const ip = await fetchJSON("https://ipapi.co/json/", { timeout: 5000 });
      const location = {
        latitude: ip.latitude,
        longitude: ip.longitude,
        city: String(ip.city || "LOCAL").toUpperCase()
      };
      locationCache = { at: Date.now(), data: location };
      return location;
    }

    async function updateWeather(){
      const tempEl = document.getElementById("temp");
      const cityEl = document.getElementById("city");
      const condEl = document.getElementById("condition");

      try {
        const location = await getLocation();
        const weather = await fetchJSON(
          `https://api.open-meteo.com/v1/forecast?latitude=${encodeURIComponent(location.latitude)}&longitude=${encodeURIComponent(location.longitude)}&current=temperature_2m,weather_code&temperature_unit=celsius`,
          { timeout: 5000 }
        );

        const current = weather.current || {};
        const temperature = typeof current.temperature_2m === "number" ? `${Math.round(current.temperature_2m)}°C` : "--";
        const weatherText = WEATHER_TEXT[current.weather_code] || "Weather";

        tempEl.textContent = temperature;
        cityEl.textContent = location.city || "LOCAL";
        condEl.textContent = weatherText;
      } catch {
        tempEl.textContent = "--";
        cityEl.textContent = "WEATHER";
        condEl.textContent = "Unavailable";
      }
    }

    function scheduleWeather(){
      clearInterval(weatherTimer);
      updateWeather();
      weatherTimer = setInterval(updateWeather, WEATHER_REFRESH_MS);
    }

    function enableTapWake(){
      let activeEl = null;
      let timer = null;

      const coarsePointer = () => window.matchMedia && window.matchMedia("(hover: none), (pointer: coarse)").matches;
      const clearActive = () => {
        if (activeEl) activeEl.classList.remove("is-active");
        activeEl = null;
        if (timer) clearTimeout(timer);
        timer = null;
      };
      const wake = (a) => {
        clearActive();
        a.classList.add("is-active");
        activeEl = a;
        timer = setTimeout(clearActive, 900);
      };

      document.addEventListener("pointerdown", (e) => {
        if (!coarsePointer()) return;
        const a = e.target.closest("a.item");
        if (!a) { clearActive(); return; }
        if (a !== activeEl){
          e.preventDefault();
          wake(a);
        }
      }, { passive:false, capture:true });

      document.addEventListener("click", (e) => {
        if (!coarsePointer()) return;
        const a = e.target.closest("a.item");
        if (!a) { clearActive(); return; }
        if (a === activeEl) return;
        e.preventDefault();
        e.stopPropagation();
        wake(a);
      }, { capture:true });

      document.addEventListener("scroll", clearActive, { passive:true });
    }

    function isTextInput(target){
      if (!target) return false;
      const tag = target.tagName;
      return target.isContentEditable || tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT";
    }

    function focusSearch(){
      const input = document.getElementById("q");
      input.focus({ preventScroll:true });
      input.select();
    }

    function bindEvents(){
      document.getElementById("toggleBtn").addEventListener("click", toggleMore);

      document.getElementById("searchForm").addEventListener("submit", (e) => {
        e.preventDefault();
        const q = document.getElementById("q").value.trim();
        if (!q) return;
        window.open(SEARCH_ENGINE + encodeURIComponent(q), "_blank", "noopener,noreferrer");
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "/" && !e.metaKey && !e.ctrlKey && !e.altKey && !isTextInput(document.activeElement)){
          e.preventDefault();
          focusSearch();
        }

        if (e.key === "Escape" && document.activeElement === document.getElementById("q")){
          if (document.getElementById("q").value){
            document.getElementById("q").value = "";
          } else {
            document.getElementById("q").blur();
          }
        }
      });

      if (window.matchMedia){
        const darkMedia = window.matchMedia("(prefers-color-scheme: dark)");
        const onThemeChange = () => updateTheme();
        if (typeof darkMedia.addEventListener === "function") darkMedia.addEventListener("change", onThemeChange);
        else if (typeof darkMedia.addListener === "function") darkMedia.addListener(onThemeChange);
      }
    }

    function init(){
      updateTheme();
      updateGreeting(new Date());
      render();
      restoreMoreState();
      scheduleClock();
      scheduleWeather();
      bindEvents();
      enableTapWake();
    }

    init();
  </script>
</body>
</html>
