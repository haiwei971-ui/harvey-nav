<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Harvey</title>

<style>
  :root{
    --bg: #0b1020;
    --panel: rgba(255,255,255,.06);
    --panel2: rgba(255,255,255,.08);
    --border: rgba(255,255,255,.10);
    --text: rgba(255,255,255,.92);
    --muted: rgba(255,255,255,.60);
    --shadow: 0 18px 60px rgba(0,0,0,.55);
    --shadow2: 0 10px 28px rgba(0,0,0,.35);
    --radius: 20px;
    --maxw: 1040px;
  }

  @media (prefers-color-scheme: light){
    :root{
      --bg: #f6f7fb;
      --panel: rgba(17,24,39,.04);
      --panel2: rgba(17,24,39,.06);
      --border: rgba(17,24,39,.10);
      --text: rgba(17,24,39,.92);
      --muted: rgba(17,24,39,.55);
      --shadow: 0 18px 60px rgba(17,24,39,.10);
      --shadow2: 0 10px 28px rgba(17,24,39,.10);
    }
  }

  *{ box-sizing:border-box; }
  body{
    margin:0;
    min-height:100vh;
    color:var(--text);
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI",
      Roboto, Helvetica, Arial, "PingFang SC","Hiragino Sans GB","Microsoft YaHei";
    background:
      radial-gradient(1200px 700px at 20% 10%, rgba(99,102,241,.18), transparent 55%),
      radial-gradient(1000px 600px at 80% 20%, rgba(16,185,129,.14), transparent 55%),
      radial-gradient(900px 700px at 50% 100%, rgba(59,130,246,.16), transparent 60%),
      var(--bg);
  }

  .wrap{
    width:min(var(--maxw), 92vw);
    margin: 26px auto 50px;
    text-align:center;
  }

  /* 顶部时间 */
  .top{
    display:flex;
    justify-content:center;
    margin: 6px 0 16px;
  }
  .chip{
    display:inline-flex;
    gap:10px;
    align-items:center;
    padding: 10px 14px;
    border-radius: 999px;
    background: var(--panel);
    border: 1px solid var(--border);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }
  .chip .t{
    font-weight: 750;
    letter-spacing: .2px;
  }
  .chip .d{
    color: var(--muted);
    font-weight: 550;
  }

  /* 标题 */
  .title{
    font-size: 56px;
    font-weight: 850;
    letter-spacing: -0.8px;
    margin: 6px 0 18px;
  }
  @media (max-width: 560px){
    .title{ font-size: 44px; }
  }

  /* 搜索框（更克制） */
  .search{
    width:min(920px, 92vw);
    margin: 0 auto 26px;
    display:flex;
    align-items:center;
    gap:12px;
    padding: 14px 16px;
    border-radius: 999px;
    background: var(--panel);
    border: 1px solid var(--border);
    box-shadow: var(--shadow2);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }
  .search .icon{
    width:18px;height:18px; opacity:.72;
  }
  .search input{
    flex:1;
    border:0;
    outline:0;
    background:transparent;
    color:var(--text);
    font-size:16px;
  }
  .search button{
    border:0;
    cursor:pointer;
    padding: 10px 14px;
    border-radius: 999px;
    background: var(--panel2);
    color: var(--text);
    font-weight: 650;
  }
  .search button:active{ transform: translateY(1px); }

  /* 网格：更像 Chrome 新标签 */
  .grid{
    width:min(920px, 92vw);
    margin: 8px auto 0;
    display:grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 22px 16px;
    justify-items:center;
  }
  @media (max-width: 980px){ .grid{ grid-template-columns: repeat(4,1fr);} }
  @media (max-width: 560px){ .grid{ grid-template-columns: repeat(3,1fr); gap:18px 14px; } }

  .item{
    text-decoration:none;
    color:inherit;
    width: 120px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
  }

  .bubble{
    width: 66px;
    height: 66px;
    border-radius: 999px;
    background: rgba(255,255,255,.07);
    border: 1px solid rgba(255,255,255,.10);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    display:grid;
    place-items:center;
    box-shadow: none;
    transition: transform .14s ease, box-shadow .14s ease, background .14s ease;
  }
  @media (prefers-color-scheme: light){
    .bubble{
      background: rgba(17,24,39,.05);
      border: 1px solid rgba(17,24,39,.10);
    }
  }

  .item:hover .bubble{
    transform: translateY(-3px);
    box-shadow: var(--shadow);
    background: rgba(255,255,255,.09);
  }
  @media (prefers-color-scheme: light){
    .item:hover .bubble{ background: rgba(17,24,39,.07); }
  }

  .bubble img{
    width: 34px;
    height: 34px;
    object-fit: contain;
    display:block;
    border-radius: 10px;
    filter: saturate(1.05) contrast(1.05);
  }

  /* 如果图标太暗：自动加一层微弱白底托起 */
  .bubble .plate{
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: rgba(255,255,255,.92);
    display:grid;
    place-items:center;
  }
  @media (prefers-color-scheme: dark){
    .bubble .plate{ background: rgba(255,255,255,.90); }
  }
  @media (prefers-color-scheme: light){
    .bubble .plate{ background: rgba(255,255,255,.98); }
  }

  .name{
    font-size: 13px;
    color: var(--muted);
    font-weight: 600;
  }

  /* 兜底 */
  .fallback{
    width:40px; height:40px;
    border-radius:12px;
    display:grid; place-items:center;
    font-weight: 850;
    color: rgba(17,24,39,.9);
    background: rgba(255,255,255,.92);
  }

  .footer{
    margin-top: 30px;
    font-size: 12px;
    color: var(--muted);
    opacity: .75;
  }
</style>
</head>

<body>
  <div class="wrap">
    <div class="top">
      <div class="chip">
        <span class="t" id="time">--:--</span>
        <span class="d" id="date">----</span>
      </div>
    </div>

    <div class="title">Harvey</div>

    <form class="search" id="searchForm">
      <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z" stroke="currentColor" stroke-width="2" opacity=".9"/>
        <path d="M16.5 16.5 21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity=".9"/>
      </svg>
      <input id="q" placeholder="Search Google or type a URL" autocomplete="off" />
      <button type="submit">Search</button>
    </form>

    <div class="grid" id="grid"></div>

    <div class="footer">nav.harveyi.com</div>
  </div>

<script>
  // 搜索：URL 直接跳转，否则 Google
  document.getElementById("searchForm").addEventListener("submit", (e) => {
    e.preventDefault();
    const q = document.getElementById("q").value.trim();
    if (!q) return;
    const isUrl = /^(https?:\/\/)?([\w-]+\.)+[\w-]+(\/.*)?$/i.test(q);
    if (isUrl) location.href = q.startsWith("http") ? q : "https://" + q;
    else location.href = "https://www.google.com/search?q=" + encodeURIComponent(q);
  });

  // 时间/日期
  const pad = (n) => String(n).padStart(2, "0");
  function tick(){
    const d = new Date();
    document.getElementById("time").textContent = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
    const opt = { weekday:"short", year:"numeric", month:"short", day:"numeric" };
    document.getElementById("date").textContent = d.toLocaleDateString(undefined, opt);
  }
  tick(); setInterval(tick, 1000);

  // 站点：使用更稳定的 favicon 源（很多站自己的图会 403）
  const favicon = (u) => `https://www.google.com/s2/favicons?domain=${encodeURIComponent(u)}&sz=128`;

  const links = [
    { name:"Google", url:"https://google.com", plate:true },
    { name:"Gmail", url:"https://mail.google.com", plate:true },
    { name:"YouTube", url:"https://youtube.com", plate:true },
    { name:"GitHub", url:"https://github.com", plate:true },
    { name:"Microsoft", url:"https://www.microsoft.com", plate:true },
    { name:"ChatGPT", url:"https://chatgpt.com", plate:true },

    { name:"Oracle", url:"https://cloud.oracle.com", plate:true },
    { name:"AWS", url:"https://aws.amazon.com", plate:true },
    { name:"Cloudflare", url:"https://dash.cloudflare.com", plate:true },
    { name:"Vultr", url:"https://my.vultr.com", plate:true },
    { name:"RackNerd", url:"https://my.racknerd.com", plate:true },
    { name:"Wikipedia", url:"https://wikipedia.org", plate:true },

    { name:"X", url:"https://x.com", plate:true },
    { name:"Reddit", url:"https://reddit.com", plate:true },
    { name:"Telegram", url:"https://web.telegram.org", plate:true },
    { name:"Discord", url:"https://discord.com", plate:true },
    { name:"Netflix", url:"https://netflix.com", plate:true },
    { name:"Apple", url:"https://apple.com", plate:true },
  ];

  const grid = document.getElementById("grid");
  grid.innerHTML = links.map(l => `
    <a class="item" href="${l.url}" target="_blank" rel="noreferrer">
      <div class="bubble">
        ${l.plate ? `<div class="plate"><img class="iconimg" src="${favicon(l.url)}" alt="${l.name}"></div>`
                  : `<img class="iconimg" src="${favicon(l.url)}" alt="${l.name}">`}
      </div>
      <div class="name">${l.name}</div>
    </a>
  `).join("");

  // 图标加载失败：字母兜底
  document.querySelectorAll("img.iconimg").forEach(img => {
    img.addEventListener("error", () => {
      const name = img.getAttribute("alt") || "";
      const letter = (name.trim()[0] || "•").toUpperCase();
      const fb = document.createElement("div");
      fb.className = "fallback";
      fb.textContent = letter;
      img.replaceWith(fb);
    });
  });
</script>
</body>
</html>
