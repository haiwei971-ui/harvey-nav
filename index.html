<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>New Tab</title>

<style>
:root{
  --bg:#0b1020;
  --text:rgba(255,255,255,.92);
  --muted:rgba(255,255,255,.56);
  --line:rgba(255,255,255,.10);
  --glass:rgba(255,255,255,.06);
  --glass2:rgba(255,255,255,.085);
  --shadow:0 18px 45px rgba(0,0,0,.35);
  --ring:rgba(255,255,255,.10);
}

*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family: ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",
  Roboto,Helvetica,Arial,"PingFang SC","Hiragino Sans GB","Microsoft YaHei";
  color:var(--text);
  background:
    radial-gradient(1100px 650px at 18% 8%,rgba(99,102,241,.16),transparent 60%),
    radial-gradient(900px 520px at 82% 18%,rgba(16,185,129,.12),transparent 62%),
    radial-gradient(900px 700px at 55% 92%,rgba(56,189,248,.10),transparent 55%),
    var(--bg);
}

/* container */
.wrap{
  width:min(980px,92vw);
  margin:56px auto 70px;
}
@media (max-width:600px){
  .wrap{ margin-top:62px; }
}

/* top */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  gap:16px;
  margin-bottom:18px;
}
.greet{
  font-size:14px;
  font-weight:400;
  opacity:.78;
  letter-spacing:.01em;
}
.clock{
  font-family: ui-monospace,"JetBrains Mono","SF Mono",Menlo,monospace;
  font-size:18px;
  font-weight:650;
  letter-spacing:.10em;
  opacity:.90;
}

/* search */
.search{
  display:flex;
  align-items:center;
  gap:12px;
  padding:14px 16px;
  border-radius:999px;
  background:var(--glass);
  border:1px solid rgba(255,255,255,.10);
  backdrop-filter:blur(18px);
  box-shadow: var(--shadow);
  transition: background .2s ease,border-color .2s ease,transform .2s ease;
}
.search:focus-within{
  background:var(--glass2);
  border-color:rgba(255,255,255,.18);
  transform: translateY(-1px);
}
.search .icon{
  width:18px;height:18px;opacity:.7;flex:0 0 auto;
}
.search input{
  flex:1;border:0;outline:0;background:transparent;
  color:var(--text);font-size:16px;
}
.search input::placeholder{ color: rgba(255,255,255,.38); }
.search button{
  border:0;background:rgba(255,255,255,.06);
  color:rgba(255,255,255,.70);
  padding:10px 14px;border-radius:999px;
  font-weight:600;cursor:pointer;
  transition:.18s ease;
}
.search button:hover{ background:rgba(255,255,255,.10); }
.search button:active{ transform:scale(.98); }

/* section */
.row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin:26px 0 14px;
}
.label{
  font-size:12px;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:var(--muted);
}
.moreBtn{
  border:1px solid rgba(255,255,255,.10);
  background:rgba(255,255,255,.04);
  color:rgba(255,255,255,.68);
  border-radius:999px;
  padding:8px 12px;
  cursor:pointer;
  transition:.2s ease;
}
.moreBtn:hover{ background:rgba(255,255,255,.08); }

/* grid */
.grid{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:26px 18px;
}
@media(max-width:980px){ .grid{ grid-template-columns:repeat(5,1fr);} }
@media(max-width:860px){ .grid{ grid-template-columns:repeat(4,1fr);} }
@media(max-width:600px){ .grid{ grid-template-columns:repeat(3,1fr);} }

/* item — 去底座但保持大热区 */
.item{
  text-decoration:none;
  color:inherit;
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  padding:10px 8px;
  border-radius:16px;
  /* 大热区：不靠底座，靠 padding + border-radius */
  min-height:92px;
  transition: transform .18s ease, background .18s ease;
  -webkit-tap-highlight-color: transparent;
}

/* hover/press 反馈：轻微抬升 + 柔光，不出现“框” */
.item::before{
  content:"";
  position:absolute;
  inset:6px;
  border-radius:18px;
  background: radial-gradient(closest-side, rgba(255,255,255,.10), transparent 65%);
  opacity:0;
  transform: scale(.98);
  transition: opacity .18s ease, transform .18s ease;
  pointer-events:none;
}
.item:hover{ transform: translateY(-2px); }
.item:hover::before{ opacity:1; transform: scale(1); }
.item:active{ transform: translateY(0px) scale(.99); }
.item:active::before{ opacity:.9; }

.icon{
  width:30px;
  height:30px;
  display:block;
  /* 让图标“漂浮”：给一点阴影，提升高级感 */
  filter: drop-shadow(0 10px 18px rgba(0,0,0,.28));
  transform: translateZ(0);
}
.icon img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
  image-rendering:auto;
}
.name{
  font-size:12.5px;
  color:rgba(255,255,255,.62);
}

/* 快捷键徽标：默认隐藏，Alt 才出现 */
.kbd{
  position:absolute;
  top:10px;
  right:12px;
  font-family: ui-monospace,"JetBrains Mono","SF Mono",Menlo,monospace;
  font-size:11px;
  letter-spacing:.06em;
  padding:4px 7px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.28);
  color:rgba(255,255,255,.70);
  opacity:0;
  transform: translateY(-4px) scale(.98);
  transition:.16s ease;
  pointer-events:none;
}

/* 只在桌面端允许显示快捷键 */
@media (hover:hover) and (pointer:fine){
  body.alt .kbd{
    opacity:1;
    transform: translateY(0) scale(1);
  }
}

/* More panel animation */
.morePanel{
  overflow:hidden;
  max-height:0;
  opacity:0;
  transform: translateY(-6px);
  transition: max-height .35s ease, opacity .25s ease, transform .25s ease;
}
.morePanel.open{
  max-height:520px;
  opacity:1;
  transform: translateY(0);
}

/* reduce motion */
@media (prefers-reduced-motion: reduce){
  *{transition:none!important}
}
</style>
</head>

<body>
<div class="wrap">

  <div class="topbar">
    <div class="greet" id="greet"></div>
    <div class="clock" id="clock"></div>
  </div>

  <form class="search" id="searchForm">
    <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z" stroke="currentColor" stroke-width="2"/>
      <path d="M16.3 16.3 21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <input id="q" placeholder="Search…" autocomplete="off" />
    <button type="submit">Search</button>
  </form>

  <div class="row">
    <div class="label">Essentials</div>
    <button type="button" class="moreBtn" id="moreBtn">More</button>
  </div>

  <div class="grid" id="essentials"></div>

  <div class="morePanel" id="morePanel">
    <div class="row" style="margin-top:22px;">
      <div class="label">More</div>
    </div>
    <div class="grid" id="moreGrid"></div>
  </div>

</div>

<script>
/* ---------- time ---------- */
const pad=n=>String(n).padStart(2,"0");
function tick(){
  const d=new Date();
  const h=d.getHours();
  const greet = h<5 ? "Good night" : h<12 ? "Good morning" : h<18 ? "Good afternoon" : "Good evening";
  document.getElementById("greet").textContent = greet + ".";
  document.getElementById("clock").textContent = `${pad(h)}:${pad(d.getMinutes())}`;
}
tick();
setInterval(tick,1000);

/* ---------- focus search ---------- */
window.addEventListener("load", ()=> {
  document.getElementById("q").focus({preventScroll:true});
});

/* ---------- favicon (高清兜底) ---------- */
const favicon = (url) => {
  const domain = new URL(url).hostname;
  return `https://www.google.com/s2/favicons?domain=${encodeURIComponent(domain)}&sz=256`;
};

/* ---------- links：常用排前 ---------- */
const essentials = [
  {name:"Google",     url:"https://google.com",             key:"G"},
  {name:"Gmail",      url:"https://mail.google.com",        key:"M"},
  {name:"ChatGPT",    url:"https://chatgpt.com",            key:"C"},
  {name:"GitHub",     url:"https://github.com",             key:"H"},
  {name:"YouTube",    url:"https://youtube.com",            key:"Y"},
  {name:"Cloudflare", url:"https://dash.cloudflare.com",    key:"F"},
  {name:"Drive",      url:"https://drive.google.com",       key:"D"},
  {name:"Calendar",   url:"https://calendar.google.com",    key:"L"},
  {name:"Microsoft",  url:"https://www.microsoft.com",      key:"S"},
  {name:"Vultr",      url:"https://my.vultr.com",           key:"V"},
  {name:"Oracle",     url:"https://cloud.oracle.com",       key:"O"},
  {name:"RackNerd",   url:"https://my.racknerd.com",        key:"R"},
];

const more = [
  {name:"Wikipedia", url:"https://wikipedia.org",           key:"W"},
  {name:"Reddit",    url:"https://reddit.com",              key:"E"},
  {name:"Discord",   url:"https://discord.com/channels/@me",key:"B"},
  {name:"X",         url:"https://x.com",                   key:"X"},
  {name:"Netflix",   url:"https://netflix.com",             key:"N"},
  {name:"Apple",     url:"https://apple.com",               key:"A"},
];

/* ---------- render ---------- */
function card(item){
  const a=document.createElement("a");
  a.className="item";
  a.href=item.url;
  a.dataset.key=item.key || "";
  a.innerHTML = `
    <span class="kbd">${item.key || ""}</span>
    <span class="icon"><img alt="" src="${favicon(item.url)}"></span>
    <span class="name">${item.name}</span>
  `;
  return a;
}

const essentialsEl=document.getElementById("essentials");
essentials.forEach(x=>essentialsEl.appendChild(card(x)));

const moreEl=document.getElementById("moreGrid");
more.forEach(x=>moreEl.appendChild(card(x)));

/* ---------- search ---------- */
document.getElementById("searchForm").addEventListener("submit",e=>{
  e.preventDefault();
  const q=document.getElementById("q").value.trim();
  if(!q) return;
  location.href="https://www.google.com/search?q="+encodeURIComponent(q);
});

/* ---------- more toggle ---------- */
const moreBtn=document.getElementById("moreBtn");
const morePanel=document.getElementById("morePanel");
let open=false;
moreBtn.addEventListener("click",()=>{
  open=!open;
  morePanel.classList.toggle("open",open);
  moreBtn.textContent = open ? "Less" : "More";
});

/* ---------- Alt 显示快捷键（桌面端） ---------- */
let altDown=false;
window.addEventListener("keydown",(e)=>{
  if(e.key === "Alt" && !altDown){
    altDown=true;
    document.body.classList.add("alt");
  }
});
window.addEventListener("keyup",(e)=>{
  if(e.key === "Alt"){
    altDown=false;
    document.body.classList.remove("alt");
  }
});

/* ---------- 快捷键跳转：按住 Alt + 字母 ---------- */
window.addEventListener("keydown",(e)=>{
  // 避免在输入框里触发
  const active = document.activeElement;
  const typing = active && (active.tagName === "INPUT" || active.tagName === "TEXTAREA");

  if(!e.altKey || typing) return;

  const k = (e.key || "").toUpperCase();
  if(!k || k.length !== 1) return;

  const all = [...document.querySelectorAll(".item")];
  const hit = all.find(x => (x.dataset.key || "").toUpperCase() === k);
  if(hit){
    e.preventDefault();
    location.href = hit.href;
  }
});
</script>
</body>
</html>
