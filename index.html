<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>New Tab</title>

<style>
  :root{
    --bg: #0b1020;
    --glass: rgba(255,255,255,.06);
    --glass2: rgba(255,255,255,.085);
    --border: rgba(255,255,255,.10);
    --border2: rgba(255,255,255,.18);
    --text: rgba(255,255,255,.92);
    --muted: rgba(255,255,255,.58);
    --muted2: rgba(255,255,255,.42);
    --shadow: 0 18px 60px rgba(0,0,0,.42);
    --shadow2: 0 12px 26px rgba(0,0,0,.22);
    --maxw: 980px;
  }
  @media (prefers-color-scheme: light){
    :root{
      --bg: #f6f7fb;
      --glass: rgba(17,24,39,.04);
      --glass2: rgba(17,24,39,.06);
      --border: rgba(17,24,39,.10);
      --border2: rgba(17,24,39,.18);
      --text: rgba(17,24,39,.92);
      --muted: rgba(17,24,39,.54);
      --muted2: rgba(17,24,39,.40);
      --shadow: 0 18px 60px rgba(17,24,39,.10);
      --shadow2: 0 10px 22px rgba(17,24,39,.10);
    }
  }

  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    margin:0;
    color:var(--text);
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI",
      Roboto, Helvetica, Arial, "PingFang SC","Hiragino Sans GB","Microsoft YaHei";
    background:
      radial-gradient(1200px 700px at 18% 12%, rgba(99,102,241,.16), transparent 55%),
      radial-gradient(1000px 600px at 82% 18%, rgba(16,185,129,.12), transparent 55%),
      radial-gradient(900px 700px at 50% 105%, rgba(59,130,246,.14), transparent 60%),
      var(--bg);
  }

  .wrap{
    width:min(var(--maxw), 92vw);
    margin: 18px auto 46px;
    text-align:center;
  }

  /* ===== Top: greeting + time ===== */
  .top{
    display:flex;
    justify-content:center;
    margin: 6px 0 14px;
  }
  .topcard{
    display:flex;
    align-items:baseline;
    gap:12px;
    padding: 10px 14px;
    border-radius: 999px;
    background: var(--glass);
    border: 1px solid var(--border);
    box-shadow: var(--shadow2);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }
  .greet{
    font-weight: 780;
    letter-spacing:.2px;
  }
  .mono{
    font-family: ui-monospace, "JetBrains Mono", "SF Mono", SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    font-weight: 800;
    letter-spacing:.06em;
    color: var(--muted);
    font-size: 13px;
    white-space: nowrap;
  }

  /* ===== Search ===== */
  .search{
    width:min(860px, 92vw);
    margin: 0 auto 16px;
    display:flex;
    align-items:center;
    gap:12px;
    padding: 11px 14px;
    border-radius: 999px;
    background: var(--glass);
    border: 1px solid var(--border);
    box-shadow: var(--shadow2);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    transition: border-color .18s ease, box-shadow .18s ease, background .18s ease, transform .08s ease;
  }
  .search:focus-within{
    border-color: var(--border2);
    background: var(--glass2);
    box-shadow: 0 18px 44px rgba(0,0,0,.30);
  }
  .search:active{ transform: translateY(1px); }
  .search .sicon{ width:18px;height:18px; opacity:.70; }
  .search input{
    flex:1;
    border:0;
    outline:0;
    background:transparent;
    color:var(--text);
    font-size:16px;
  }
  .search .hint{
    color: var(--muted2);
    font-weight: 700;
    font-size: 12px;
    padding-right: 6px;
    user-select:none;
    white-space: nowrap;
  }
  .search button{
    border:0;
    cursor:pointer;
    padding: 9px 12px;
    border-radius: 999px;
    background: transparent;
    color: var(--muted);
    font-weight: 850;
    letter-spacing:.02em;
  }
  .search button:hover{ color: var(--text); }

  /* ===== Section header ===== */
  .row{
    width:min(860px, 92vw);
    margin: 12px auto 10px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    opacity:.92;
  }
  .label{
    text-align:left;
    color: color-mix(in srgb, var(--muted) 92%, transparent);
    font-size: 12px;
    font-weight: 850;
    letter-spacing: .18em;
    text-transform: uppercase;
  }
  .btn{
    border:1px solid transparent;
    background: transparent;
    color: var(--muted);
    padding: 8px 10px;
    border-radius: 999px;
    cursor:pointer;
    font-weight: 850;
    letter-spacing:.02em;
    transition: background .12s ease, border-color .12s ease, color .12s ease, transform .08s ease;
  }
  .btn:hover{
    color: var(--text);
    background: var(--glass);
    border-color: var(--border);
  }
  .btn:active{ transform: translateY(1px); }

  /* ===== Grid ===== */
  .grid{
    width:min(860px, 92vw);
    margin: 8px auto 0;
    display:grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 18px 16px;
    justify-items:center;
  }
  @media (max-width: 980px){ .grid{ grid-template-columns: repeat(4,1fr);} }
  @media (max-width: 560px){ .grid{ grid-template-columns: repeat(3,1fr); gap:16px 14px; } }

  .item{
    text-decoration:none;
    color:inherit;
    width: 112px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
  }

  /* Icon (no base, unified) */
  .icon{
    width: 54px;
    height: 54px;
    border-radius: 999px;
    background: rgba(255,255,255,.02);
    border: 1px solid var(--border);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    display:grid;
    place-items:center;
    transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease, background .16s ease;
  }
  .item:hover .icon{
    transform: translateY(-2px);
    box-shadow: var(--shadow);
    background: rgba(255,255,255,.04);
    border-color: var(--border2);
  }
  .item:active .icon{ transform: translateY(-1px) scale(.985); }

  /* Favicon unify: default monochrome-ish, hover shows brand color */
  .icon img{
    width: 26px;
    height: 26px;
    object-fit: contain;
    display:block;
    filter: grayscale(1) saturate(0) brightness(1.55);
    opacity: .78;
    transition: filter .16s ease, opacity .16s ease, transform .16s ease;
    image-rendering: -webkit-optimize-contrast;
  }
  .item:hover .icon img{
    filter: none;
    opacity: 1;
    transform: translateY(-.5px);
  }

  .meta{
    display:flex;
    align-items:baseline;
    gap:8px;
  }
  .name{
    font-size: 12.5px;
    color: var(--muted);
    font-weight: 680;
    letter-spacing:.1px;
  }
  kbd{
    font-family: ui-monospace, "JetBrains Mono", "SF Mono", SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    font-size: 10.5px;
    font-weight: 850;
    color: color-mix(in srgb, var(--muted) 92%, transparent);
    padding: 2px 6px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,.03);
    opacity: .75;
    transform: translateY(-.5px);
  }
  .item:hover kbd{ opacity: .95; }

  .fallback{
    width: 26px;
    height: 26px;
    border-radius: 9px;
    display:grid;
    place-items:center;
    font-weight: 900;
    letter-spacing:.02em;
    color: rgba(255,255,255,.86);
    opacity:.78;
  }

  /* ===== More panel with spring-ish animation ===== */
  .more{
    width:min(860px, 92vw);
    margin: 14px auto 0;
    padding: 14px 14px 10px;
    border-radius: 22px;
    background: var(--glass);
    border: 1px solid var(--border);
    box-shadow: var(--shadow2);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);

    overflow: hidden;
    max-height: 0;
    opacity: 0;
    transform: translateY(-6px) scale(.985);
    transition:
      max-height .38s cubic-bezier(.2,.9,.2,1),
      opacity .22s ease,
      transform .28s cubic-bezier(.2,.9,.2,1);
  }
  .more.show{
    max-height: 520px; /* enough for grid; adjust if you add more */
    opacity: 1;
    transform: translateY(0) scale(1);
  }
</style>
</head>

<body>
  <div class="wrap">
    <div class="top">
      <div class="topcard">
        <span class="greet" id="greet">Good evening.</span>
        <span class="mono" id="clock">--:-- · ----</span>
      </div>
    </div>

    <form class="search" id="searchForm">
      <svg class="sicon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z"
              stroke="currentColor" stroke-width="2" opacity=".9"/>
        <path d="M16.5 16.5 21 21"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity=".9"/>
      </svg>
      <input id="q" placeholder='Try: "/y 测评"  "/g repo"  "/r ai"' autocomplete="off" />
      <span class="hint">/ focus · Esc close</span>
      <button type="submit">Search</button>
    </form>

    <div class="row">
      <div class="label">Essentials</div>
      <button class="btn" id="toggle">More</button>
    </div>

    <div class="grid" id="gridMain"></div>

    <div class="more" id="moreBox">
      <div class="row" style="margin:0 0 10px;">
        <div class="label">More</div>
        <div class="label" style="text-align:right; opacity:.70; font-weight:700;">Clean. Fast. Quiet.</div>
      </div>
      <div class="grid" id="gridMore"></div>
    </div>
  </div>

<script>
  const NAME = "Harvey";

  // ---------- Time + Greeting ----------
  const pad = (n) => String(n).padStart(2, "0");
  function greetByHour(h){
    if (h < 5) return `Good night, ${NAME}.`;
    if (h < 12) return `Good morning, ${NAME}.`;
    if (h < 18) return `Good afternoon, ${NAME}.`;
    return `Good evening, ${NAME}.`;
  }
  function tick(){
    const d = new Date();
    const h = d.getHours();
    const m = d.getMinutes();
    document.getElementById("greet").textContent = greetByHour(h);
    const opt = { weekday:"short", year:"numeric", month:"short", day:"numeric" };
    const ds = d.toLocaleDateString(undefined, opt);
    document.getElementById("clock").textContent = `${pad(h)}:${pad(m)} · ${ds}`;
  }
  tick(); setInterval(tick, 1000);

  // ---------- Auto focus search ----------
  window.addEventListener("DOMContentLoaded", () => {
    const q = document.getElementById("q");
    q.focus({ preventScroll:true });
  });

  // ---------- Stable favicons ----------
  const favicon = (u) => `https://www.google.com/s2/favicons?domain=${encodeURIComponent(u)}&sz=128`;

  // ---------- Links ----------
  const mainLinks = [
    { name:"Gmail",      key:"M", url:"https://mail.google.com" },
    { name:"ChatGPT",    key:"C", url:"https://chatgpt.com" },
    { name:"GitHub",     key:"H", url:"https://github.com" },
    { name:"Cloudflare", key:"F", url:"https://dash.cloudflare.com" },
    { name:"Google",     key:"G", url:"https://google.com" },
    { name:"YouTube",    key:"Y", url:"https://youtube.com" },

    { name:"Drive",      key:"D", url:"https://drive.google.com" },
    { name:"Calendar",   key:"L", url:"https://calendar.google.com" },
    { name:"Microsoft",  key:"",  url:"https://www.microsoft.com" },
    { name:"Vultr",      key:"V", url:"https://my.vultr.com" },
    { name:"Oracle",     key:"O", url:"https://cloud.oracle.com" },
    { name:"RackNerd",   key:"R", url:"https://my.racknerd.com" },
  ];

  const moreLinks = [
    { name:"AWS",        key:"", url:"https://aws.amazon.com" },
    { name:"Wikipedia",  key:"W", url:"https://wikipedia.org" },
    { name:"X",          key:"", url:"https://x.com" },
    { name:"Reddit",     key:"", url:"https://reddit.com" },
    { name:"Telegram",   key:"", url:"https://web.telegram.org" },
    { name:"Discord",    key:"", url:"https://discord.com" },
    { name:"Netflix",    key:"", url:"https://netflix.com" },
    { name:"Apple",      key:"", url:"https://apple.com" },
    { name:"Speedtest",  key:"", url:"https://www.speedtest.net" },
  ];

  function render(el, arr){
    el.innerHTML = arr.map(l => `
      <a class="item" href="${l.url}" target="_blank" rel="noreferrer" data-key="${(l.key||"").toLowerCase()}">
        <div class="icon" aria-hidden="true">
          <img class="iconimg" src="${favicon(l.url)}" alt="${l.name}">
        </div>
        <div class="meta">
          <div class="name">${l.name}</div>
          ${l.key ? `<kbd>${l.key}</kbd>` : ``}
        </div>
      </a>
    `).join("");

    el.querySelectorAll("img.iconimg").forEach(img => {
      img.addEventListener("error", () => {
        const name = img.getAttribute("alt") || "";
        const letter = (name.trim()[0] || "•").toUpperCase();
        const fb = document.createElement("div");
        fb.className = "fallback";
        fb.textContent = letter;
        img.replaceWith(fb);
      });
    });
  }

  render(document.getElementById("gridMain"), mainLinks);
  render(document.getElementById("gridMore"), moreLinks);

  // ---------- More toggle ----------
  const moreBox = document.getElementById("moreBox");
  const btn = document.getElementById("toggle");
  function setMore(show){
    moreBox.classList.toggle("show", show);
    btn.textContent = show ? "Less" : "More";
  }
  btn.addEventListener("click", () => setMore(!moreBox.classList.contains("show")));

  // ---------- Bang search ----------
  function goSearch(raw){
    const q = raw.trim();
    if (!q) return;

    // URL direct
    const isUrl = /^(https?:\/\/)?([\w-]+\.)+[\w-]+(\/.*)?$/i.test(q);
    if (isUrl) { location.href = q.startsWith("http") ? q : "https://" + q; return; }

    // Commands
    // /y xxx => YouTube
    // /g xxx => GitHub (按你要求)
    // /r xxx => Reddit
    // /w xxx => Wikipedia
    // /c     => ChatGPT
    const cmd = q.match(/^\/([a-z]+)\s*(.*)$/i);
    if (cmd){
      const c = cmd[1].toLowerCase();
      const rest = (cmd[2] || "").trim();

      if (c === "c"){ location.href = "https://chatgpt.com"; return; }
      if (!rest){ return; }

      if (c === "y"){ location.href = "https://www.youtube.com/results?search_query=" + encodeURIComponent(rest); return; }
      if (c === "g"){ location.href = "https://github.com/search?q=" + encodeURIComponent(rest); return; }
      if (c === "r"){ location.href = "https://www.reddit.com/search/?q=" + encodeURIComponent(rest); return; }
      if (c === "w"){ location.href = "https://en.wikipedia.org/w/index.php?search=" + encodeURIComponent(rest); return; }
    }

    // default: Google
    location.href = "https://www.google.com/search?q=" + encodeURIComponent(q);
  }

  document.getElementById("searchForm").addEventListener("submit", (e) => {
    e.preventDefault();
    goSearch(document.getElementById("q").value);
  });

  // ---------- Keyboard shortcuts ----------
  // "/" focus search; Esc close more & blur
  // G Google, Y YouTube, C ChatGPT, H GitHub, M Gmail, D Drive, L Calendar, F Cloudflare, V Vultr, O Oracle, R RackNerd, W Wikipedia
  const quick = {
    g: "https://google.com",
    y: "https://youtube.com",
    c: "https://chatgpt.com",
    h: "https://github.com",
    m: "https://mail.google.com",
    d: "https://drive.google.com",
    l: "https://calendar.google.com",
    f: "https://dash.cloudflare.com",
    v: "https://my.vultr.com",
    o: "https://cloud.oracle.com",
    r: "https://my.racknerd.com",
    w: "https://wikipedia.org",
  };

  document.addEventListener("keydown", (e) => {
    const q = document.getElementById("q");
    const typing = document.activeElement === q;

    // Esc
    if (e.key === "Escape"){
      setMore(false);
      if (typing) q.blur();
      return;
    }

    // "/" focus
    if (e.key === "/" && !typing){
      e.preventDefault();
      q.focus({ preventScroll:true });
      return;
    }

    // single-letter shortcuts only when NOT typing
    if (typing) return;
    if (e.ctrlKey || e.metaKey || e.altKey) return;
    if (e.key.length !== 1) return;

    const k = e.key.toLowerCase();
    if (quick[k]){
      location.href = quick[k];
    }
  });
</script>
</body>
</html>
