<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Harveyi</title>
  <meta name="apple-mobile-web-app-title" content="Harveyi">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
      /* Day Theme */
      --bg-top:#FFFFFF; --bg-bottom:#F5F5F7;
      --text:#1D1D1F; --muted:rgba(0,0,0,0.52);
      --hair:rgba(0,0,0,0.08); --surface: rgba(255,255,255,0.56);
      --surface-strong: rgba(255,255,255,0.75);
      --search: rgba(0,0,0,0.035);
      --icon-default-opacity: 0.70; --icon-brightness: 1.05;
      --glow-opacity:0.12; --focus: rgba(0,122,255,0.32);
    }

    body.theme-night{
      --bg-top:#0B0F18; --bg-bottom:#070A12;
      --text:rgba(255,255,255,0.92); --muted:rgba(255,255,255,0.58);
      --hair:rgba(255,255,255,0.12); --surface: rgba(18,22,32,0.58);
      --surface-strong: rgba(255,255,255,0.05); /* 夜间基座极暗 */
      --search: rgba(255,255,255,0.09);
      --icon-default-opacity: 0.92; --icon-brightness: 1.45;
      --glow-opacity:0.25; --focus: rgba(10,132,255,0.36);
    }

    *{ box-sizing:border-box }
    html,body{ height:100% }
    body{
      margin:0; font-family: Inter, -apple-system, system-ui, sans-serif;
      color:var(--text); background: linear-gradient(180deg,var(--bg-top),var(--bg-bottom));
      min-height:100vh; transition: background 900ms var(--ease), color 900ms var(--ease);
      overflow-x:hidden; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    }

    .bg-flow{ position:fixed; inset:-20%; pointer-events:none; z-index:-3; filter:blur(120px); opacity:.26; }
    .bg-flow .blob{
      position:absolute; width:70vmax; height:70vmax; border-radius:999px;
      background: radial-gradient(circle, var(--brand-color, #a1c4fd), transparent 62%);
      animation: drift 70s cubic-bezier(.45, 0, .55, 1) infinite alternate;
    }
    @keyframes drift{ from{ transform:translate(-8%,-8%) } to{ transform:translate(10%,10%) } }

    .wrap{ max-width: 1040px; margin: auto; padding: calc(22px + env(safe-area-inset-top)) 20px 58px; }

    .top{ display:flex; justify-content:space-between; align-items:flex-end; margin-bottom: 10px; opacity: .92; }
    .top-left .greet{ font-size: 22px; font-weight: 650; margin-bottom: 2px; }
    .top-left .weather{ font-size: 13px; color: var(--muted); display:flex; gap: 8px; align-items:center; min-height: 18px; }
    .clock{ font-family:"JetBrains Mono"; font-weight: 600; font-size: 24px; letter-spacing: -1px; }

    .quote-area{ margin: 14px 0 18px; padding: 0 10px; border-left: 2px solid var(--hair); opacity: .78; }
    .quote-text{ font-size: 14px; font-style: italic; color: var(--muted); line-height: 1.55; max-width: 640px; }
    .quote-author{ font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; margin-top: 6px; opacity: 0.62; }

    .search{
      display:flex; align-items:center; gap: 12px; background: var(--surface);
      border: 1px solid var(--hair); padding: 14px 18px; border-radius: 999px;
      margin-bottom: 18px; backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px);
      transition: transform .28s var(--ease), box-shadow .28s var(--ease);
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    }
    .search:focus-within{ transform: scale(1.01); border-color: var(--focus); box-shadow: 0 14px 38px rgba(0,0,0,0.10); }
    .search input{ flex:1; background: transparent; border: 0; outline: none; color: var(--text); font-size: 17px; }

    .section{ margin: 16px 0 10px; display:flex; align-items:center; gap: 12px; color: var(--muted); font-size: 11px; letter-spacing: .20em; text-transform: uppercase; font-weight: 650; }
    .section .line{ flex:1; height:1px; background: var(--hair); }

    .grid{ display:grid; gap: 26px 18px; grid-template-columns: repeat(6, 1fr); }
    @media (max-width:760px){ .grid{ grid-template-columns: repeat(4, 1fr); } }
    @media (max-width:520px){ .grid{ grid-template-columns: repeat(3, 1fr); } }

    .item{ position:relative; display:flex; flex-direction:column; align-items:center; gap: 10px; text-decoration:none; color: var(--muted); transition: transform .22s var(--ease); min-height: 92px; -webkit-tap-highlight-color: transparent; }
    .item:active{ transform: scale(0.96); transition: transform .08s; }

    .icon{ width: 56px; height: 56px; display:grid; place-items:center; position:relative; border-radius: 16px; background: var(--surface-strong); border: 1px solid var(--hair); box-shadow: 0 8px 20px rgba(0,0,0,0.06); transition: .25s var(--ease); overflow:hidden; }

    /* =========================
       ✅ 核心滤镜重构：防御图标隐身
       ========================= */
    .icon img{
      width: 36px; height: 36px; object-fit: contain; transform: translateY(var(--y, 0px)) scale(var(--s, 1));
      filter: grayscale(100%) opacity(var(--icon-default-opacity));
      transition: transform .35s var(--ease), filter .35s var(--ease), opacity .35s var(--ease);
      will-change: filter, transform;
    }

    /* 1. 夜间静态态：白色图标反转 (GitHub, X, ChatGPT等) */
    body.theme-night .white-invert .icon img,
    body.theme-night .white-invert .icon.gemini img.g0 {
      filter: grayscale(100%) invert(1) brightness(1.8) opacity(var(--icon-default-opacity)) !important;
    }

    /* 2. 激活态：全彩展现 (Hover & Tap) */
    .item:hover .icon img, 
    .item.is-active .icon img {
      filter: grayscale(0%) invert(0%) brightness(1) opacity(1) !important;
      transform: translateY(calc(var(--y, 0px) - 6px)) scale(var(--s, 1));
    }

    /* Gemini 特殊层逻辑 */
    .icon.gemini img.g1 { position:absolute; opacity: 0; transition: .38s var(--ease); filter: none !important; }
    .item:hover .icon.gemini img.g0, .item.is-active .icon.gemini img.g0 { opacity: 0; }
    .item:hover .icon.gemini img.g1, .item.is-active .icon.gemini img.g1 { opacity: 1; transform: translateY(calc(var(--y, 0px) - 6px)) scale(var(--s, 1)); }

    .item:hover .icon::after, .item.is-active .icon::after {
      content:""; position:absolute; inset:-14px; border-radius: 22px; z-index:-1;
      filter: blur(34px); opacity: var(--glow-opacity);
      background: radial-gradient(circle, var(--brand-color, #7C5CFF), transparent 72%);
    }

    .label{ font-size: 13px; text-align:center; white-space: nowrap; transition: color .25s var(--ease); }
    .item:hover .label, .item.is-active .label { color: var(--text); }

    #moreArea[aria-hidden="true"]{ display:none; }
    .morebtn{ background: var(--surface); border: 1px solid var(--hair); color: var(--text); padding: 9px 24px; border-radius: 999px; cursor:pointer; font-size: 13px; opacity: .72; transition: .25s var(--ease); margin: 26px auto 0; display:block; backdrop-filter: blur(18px); }
  </style>
</head>

<body>
  <div class="bg-flow"><div class="blob"></div></div>
  <div class="wrap">
    <div class="top">
      <div class="top-left">
        <div id="greet" class="greet">Hello.</div>
        <div class="weather">
          <span id="temp">…</span><span id="city">WEATHER</span>
        </div>
      </div>
      <div class="clock" id="clock">00:00</div>
    </div>
    <div class="quote-area"><div id="quote" class="quote-text"></div><div id="author" class="quote-author"></div></div>
    <form class="search" id="searchForm" autocomplete="off" role="search">
      <input id="q" type="search" placeholder="Search..." autofocus />
    </form>
    <div class="section">ESSENTIALS<div class="line"></div></div>
    <div id="ess" class="grid"></div>
    <div id="moreArea" aria-hidden="true">
      <div class="section" style="margin-top:18px;">EXTENDED<div class="line"></div></div>
      <div id="ext" class="grid"></div>
    </div>
    <button class="morebtn" id="toggleBtn">More Icons</button>
  </div>

  <script>
    const ICON_BASE = "icons/", FALLBACK = "openai.svg";
    const QUOTES = [
      { t: "Stay hungry, stay foolish.", a: "Steve Jobs" },
      { t: "Simplicity is the ultimate sophistication.", a: "Leonardo da Vinci" },
      { t: "Design is how it works.", a: "Steve Jobs" },
      { t: "Make it simple, but significant.", a: "Don Draper" }
    ];

    const SITES = [
      // Essentials (Row 1-2)
      { n:"ChatGPT",      u:"https://chatgpt.com/",                  i:"openai.svg",           c:"#10a37f", r:1, w:true },
      { n:"Claude",       u:"https://claude.ai/",                    i:"claude-color.svg",     c:"#d97757", r:1 },
      { n:"Copilot",      u:"https://copilot.microsoft.com/",        i:"copilot-color.svg",    c:"#0078d4", r:1 },
      { n:"Gemini",       u:"https://gemini.google.com/",            gem:true, s:1.14,         c:"#4e85ff", r:1, w:true },
      { n:"GitHub",       u:"https://github.com/",                   i:"github.svg",           c:"#ffffff", r:1, w:true },
      { n:"Cloudflare",   u:"https://dash.cloudflare.com/",          i:"cloudflare-color.svg", c:"#f48120", r:1 },

      { n:"Gmail",        u:"https://mail.google.com/",              i:"google-gmail.svg",     c:"#ea4335", r:2 },
      { n:"Google",       u:"https://www.google.com/",               i:"google-color.svg",     c:"#4285f4", r:2 },
      { n:"Google Cloud", u:"https://console.cloud.google.com/",     i:"googlecloud-color.svg",c:"#4285f4", r:2 },
      { n:"Google Drive", u:"https://drive.google.com/",             i:"google-drive.svg",     c:"#34a853", r:2 },
      { n:"Google Maps",  u:"http://googleusercontent.com/maps.google.com/0",           i:"google-maps.svg",      c:"#4285f4", r:2 },
      { n:"YouTube",      u:"https://youtube.com/results?search_query=",              i:"youtube_red.svg",      c:"#ff0000", r:2 },

      // Extended (Row 3-4)
      { n:"AWS",          u:"https://aws.amazon.com/",               i:"aws.svg",              c:"#ff9900", r:3, w:true },
      { n:"Azure",        u:"https://portal.azure.com/",             i:"azure.svg",            c:"#0078d4", r:3, w:true },
      { n:"Microsoft",    u:"https://www.microsoft.com/",            i:"microsoft.svg",        c:"#ffffff", r:3, w:true },
      { n:"Bing",         u:"https://www.bing.com/",                 i:"bing.svg",             c:"#008373", r:3, w:true },
      { n:"Netflix",      u:"https://netflix.com/",                  i:"netflix-icon.svg",     c:"#e50914", r:3, w:true },
      { n:"Spotify",      u:"http://googleusercontent.com/spotify.com/3",             i:"spotify-icon.svg",     c:"#1db954", r:3 },
      { n:"X",            u:"https://x.com/",                        i:"x.svg",                c:"#ffffff", r:3, w:true },
      { n:"Reddit",       u:"https://www.reddit.com/",               i:"reddit.svg",           c:"#ff4500", r:3, w:true },
      { n:"Telegram",     u:"https://web.telegram.org/",             i:"telegram.svg",         c:"#2aabee", r:3, w:true },
      { n:"Apple",        u:"https://www.apple.com/",                i:"apple.svg",            c:"#ffffff", r:3, w:true },
      { n:"Meta",         u:"https://about.meta.com/",               i:"meta-color.svg",       c:"#0EA5E9", r:3 },
      { n:"Wikipedia",    u:"https://www.wikipedia.org/",            i:"wiki.svg",             c:"#999999", r:3, w:true }
    ];

    function imgTag(src, cls){
      return `<img class="${cls}" src="${ICON_BASE}${encodeURIComponent(src)}" onerror="this.src='${ICON_BASE}${FALLBACK}'">`;
    }

    function render(){
      const ess = document.getElementById("ess"), ext = document.getElementById("ext");
      ess.innerHTML = ext.innerHTML = "";
      SITES.forEach(s=>{
        const a = document.createElement("a");
        a.className = `item ${s.w ? "white-invert" : ""}`;
        a.href = s.u; a.target = "_blank"; a.rel = "noopener noreferrer";
        a.style.setProperty("--brand-color", s.c);
        if (s.s) a.style.setProperty("--s", s.s);
        const iconHTML = s.gem 
          ? `<div class="icon gemini">${imgTag("gemini.svg","g0")}${imgTag("gemini-color.svg","g1")}</div>`
          : `<div class="icon">${imgTag(s.i,"single")}</div>`;
        a.innerHTML = `${iconHTML}<div class="label">${s.n}</div>`;
        (s.r <= 2 ? ess : ext).appendChild(a);
      });
    }

    async function updateWeather(){
      try {
        const res = await fetch("https://ipapi.co/json/");
        const ip = await res.json();
        const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${ip.latitude}&longitude=${ip.longitude}&current=temperature_2m`);
        const w = await wRes.json();
        document.getElementById("temp").textContent = `${Math.round(w.current.temperature_2m)}°C`;
        document.getElementById("city").textContent = ip.city.toUpperCase();
      } catch(e) { document.getElementById("city").textContent = "OFFLINE"; }
    }

    function updateTheme(){
      const h = new Date().getHours(), b = document.body;
      const night = h >= 17 || h < 8;
      b.classList.toggle("theme-night", night);
      document.getElementById("greet").textContent = night ? "Good night." : (h < 12 ? "Good morning." : "Good afternoon.");
    }

    function tick(){
      const d = new Date();
      document.getElementById("clock").textContent = `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
    }

    document.getElementById("toggleBtn").onclick = ()=>{
      const m = document.getElementById("moreArea"), b = document.getElementById("toggleBtn");
      const open = m.getAttribute("aria-hidden") === "false";
      m.setAttribute("aria-hidden", !open);
      b.textContent = open ? "More Icons" : "Less Icons";
    };

    (function enableTapWake(){
      let activeEl = null, timer = null;
      document.addEventListener("touchstart", (e)=>{
        const a = e.target.closest("a.item");
        if (!a) { if(activeEl) activeEl.classList.remove("is-active"); activeEl=null; return; }
        if (a !== activeEl){ 
          e.preventDefault(); 
          if(activeEl) activeEl.classList.remove("is-active"); 
          a.classList.add("is-active"); activeEl=a; 
          clearTimeout(timer); timer=setTimeout(()=>{a.classList.remove("is-active"); activeEl=null;}, 850); 
        }
      }, {passive:false});
    })();

    const q = QUOTES[Math.floor(Math.random()*QUOTES.length)];
    document.getElementById("quote").textContent = `"${q.t}"`;
    document.getElementById("author").textContent = q.a;

    updateTheme(); tick(); render(); updateWeather();
    setInterval(tick, 1000); setInterval(updateTheme, 60000);
  </script>
</body>
</html>
